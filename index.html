  {"name":"Куриные ножки в духовке","calories":370,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"куриные ножки 2 шт., специи, масло 1 ч.л.","recipe":"1. Ножки натереть специями, смазать маслом.\n2. Запекать при 200°C 50 минут.\n3. Кожа должна стать хрустящей.\n4. Подавать горячими.","bju":"Б:30,Ж:18,У:6"},
  {"name":"Говядина с картофелем в горшочке","calories":390,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"говядина 100 г, картофель 150 г, лук, морковь","recipe":"1. Мясо и овощи нарезать.\n2. Сложить в горшочек, залить 100 мл воды.\n3. Запекать при 180°C 1,5 часа.\n4. Посолить, подавать.","bju":"Б:26,Ж:12,У:40"},
  {"name":"Овощной суп с чечевицей","calories":310,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"чечевица 80 г, кабачки, помидоры, вода","recipe":"1. Чечевицу промыть, варить 10 минут.\n2. Добавить нарезанные кабачки и помидоры.\n3. Варить ещё 15 минут.\n4. Посолить, подавать.","bju":"Б:16,Ж:2,У:50"},
  {"name":"Фаршированные баклажаны","calories":350,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"баклажаны 2 шт., рис 50 г, томаты, сыр 30 г","recipe":"1. Баклажаны разрезать вдоль, удалить мякоть.\n2. Рис отварить, смешать с нарезанной мякотью и томатами.\n3. Начинить половинки, посыпать сыром.\n4. Запечь 30 минут при 180°C.","bju":"Б:8,Ж:8,У:55"},
  {"name":"Капустная запеканка","calories":380,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"капуста 200 г, яйца 2 шт., мука 20 г, масло 1 ч.л.","recipe":"1. Капусту нашинковать, потушить 15 минут.\n2. Смешать с яйцами, мукой, маслом.\n3. Выложить в форму.\n4. Запекать 25 минут при 180°C.","bju":"Б:10,Ж:12,У:42"},
  {"name":"Стейк из лосося с брокколи","calories":380,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"стейк лосося 120 г, брокколи 100 г, масло 1 ч.л.","recipe":"1. Лосось посолить, обжарить на масле по 3 минуты.\n2. Брокколи сварить на пару 5 минут.\n3. Подавать вместе.\n4. Сбрызнуть лимоном.","bju":"Б:28,Ж:20,У:8"},
  {"name":"Креветки с рисом","calories":370,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки 120 г, рис 60 г, соевый соус","recipe":"1. Рис отварить.\n2. Креветки обжарить 2 минуты.\n3. Смешать, добавить соевый соус.\n4. Прогреть 1 минуту.","bju":"Б:28,Ж:4,У:54"},
  {"name":"Фуа-гра с яблоками","calories":390,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"фуа-гра 60 г, яблоко 1 шт., мёд","recipe":"1. Яблоко нарезать дольками, карамелизовать с мёдом.\n2. Фуа-гра обжарить на сухой сковороде по 1 минуте с каждой стороны.\n3. Подавать вместе.\n4. Украсить зеленью.","bju":"Б:10,Ж:28,У:24"},
  {"name":"Тартар из тунца с манго","calories":320,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"тунец 80 г, манго 50 г, авокадо, соус","recipe":"1. Тунец, манго и авокадо нарезать кубиками.\n2. Смешать с соевым соусом и соком лайма.\n3. Выложить через форму.\n4. Подавать.","bju":"Б:18,Ж:10,У:30"},
  {"name":"Сашими из лосося и тунца","calories":350,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"лосось 60 г, тунец 60 г, васаби, соевый соус","recipe":"1. Рыбу нарезать слайсами.\n2. Красиво выложить.\n3. Подавать с васаби и соевым соусом.\n4. Есть палочками.","bju":"Б:28,Ж:12,У:4"},
  {"name":"Морской гребешок с лимонным соусом","calories":380,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки 100 г, лимон, масло 1 ч.л.","recipe":"1. Гребешки обжарить на масле по 1,5 минуты.\n2. Сбрызнуть лимонным соком.\n3. Подавать на листьях салата.\n4. Украсить цедрой.","bju":"Б:22,Ж:6,У:20"},
  {"name":"Филе сибаса с овощами","calories":350,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"филе сибаса 120 г, цукини, помидоры, масло 1 ч.л.","recipe":"1. Рыбу посолить.\n2. Овощи нарезать кружками.\n3. Всё выложить на противень, сбрызнуть маслом.\n4. Запекать 20 минут при 200°C.","bju":"Б:28,Ж:10,У:18"},
  {"name":"Стейк из тунца с кунжутом","calories":380,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"стейк тунца 120 г, кунжут, соевый соус","recipe":"1. Стейк обвалять в кунжуте.\n2. Обжарить на сухой сковороде по 2 минуты с каждой стороны.\n3. Сбрызнуть соевым соусом.\n4. Нарезать ломтиками.","bju":"Б:30,Ж:14,У:12"},
  {"name":"Лобстер на гриле с овощами","calories":400,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"хвост лобстера 120 г, спаржа, масло 1 ч.л.","recipe":"1. Хвост разрезать, смазать маслом.\n2. Спаржу бланшировать 2 минуты.\n3. Обжарить на гриле лобстера 4 минуты и спаржу.\n4. Подавать.","bju":"Б:32,Ж:8,У:14"},
  {"name":"Салат с креветками и грейпфрутом","calories":310,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"креветки 80 г, грейпфрут ½ шт., салат, масло 1 ч.л.","recipe":"1. Креветки отварить.\n2. Грейпфрут разобрать на дольки, очистить от плёнок.\n3. Смешать с салатом.\n4. Заправить маслом.","bju":"Б:18,Ж:6,У:24"},
  {"name":"Запечённые мидии в белом вине","calories":350,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"мидии 300 г, белое вино 50 мл, чеснок","recipe":"1. Мидии очистить.\n2. В сотейник влить вино, добавить чеснок.\n3. Довести до кипения, добавить мидии.\n4. Готовить под крышкой 5 минут, пока не откроются.","bju":"Б:28,Ж:8,У:10"},
  {"name":"Ризотто с грибами и пармезаном","calories":390,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"рис арборио 70 г, грибы 80 г, пармезан 30 г","recipe":"1. Грибы обжарить.\n2. Рис обжарить с луком, постепенно добавлять бульон 18 минут.\n3. Добавить грибы, пармезан.\n4. Перемешать, дать отдохнуть 2 минуты.","bju":"Б:14,Ж:12,У:56"},
  {"name":"Говядина по-строгановски","calories":370,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"говядина 120 г, сметана 50 г, лук, масло 1 ч.л.","recipe":"1. Говядину нарезать полосками.\n2. Лук обжарить, добавить мясо.\n3. Влить сметану, 50 мл воды.\n4. Тушить 1 час.","bju":"Б:26,Ж:18,У:8"},
  {"name":"Бараньи рёбрышки в духовке","calories":390,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"рёбрышки 150 г, чеснок, розмарин","recipe":"1. Рёбрышки натереть чесноком, розмарином.\n2. Запекать при 160°C 1,5 часа.\n3. Увеличить температуру до 220°C на 10 минут для корочки.\n4. Подавать.","bju":"Б:24,Ж:24,У:4"},
  {"name":"Утиная ножка с апельсинами","calories":400,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"утиная ножка 150 г, апельсин, мёд","recipe":"1. Ножку посолить, обжарить.\n2. Залить соком апельсина и мёдом.\n3. Запекать 1,5 часа при 180°C.\n4. Поливать соком.","bju":"Б:26,Ж:22,У:14"},
  {"name":"Овощное карри с кокосовым молоком","calories":340,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"овощи 200 г, кокосовое молоко 100 мл, карри","recipe":"1. Овощи нарезать.\n2. Обжарить с пастой карри.\n3. Влить кокосовое молоко.\n4. Тушить 15 минут.","bju":"Б:5,Ж:18,У:30"},
  {"name":"Фаршированная тыква с киноа","calories":370,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"тыква 300 г, киноа 50 г, орехи, сухофрукты","recipe":"1. Тыкву запечь целиком 30 минут.\n2. Киноа отварить, смешать с орехами и сухофруктами.\n3. Начинить тыкву.\n4. Запечь ещё 15 минут.","bju":"Б:8,Ж:10,У:60"},
  {"name":"Грибной террин","calories":390,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"шампиньоны 200 г, яйца 2 шт., сливки 50 мл","recipe":"1. Грибы измельчить, потушить.\n2. Яйца взбить со сливками.\n3. Смешать, запечь в форме 40 минут при 160°C.\n4. Остудить, нарезать.","bju":"Б:12,Ж:22,У:18"},
  {"name":"Яичница с колбасой и хлебом","calories":480,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"яйца 2 шт., колбаса варёная 100 г, хлеб 2 ломтика, масло 1 ч.л.","recipe":"1. Колбасу нарезать, обжарить на масле.\n2. Яйца взбить, залить колбасу.\n3. Жарить 4 минуты.\n4. Подавать с поджаренным хлебом.","bju":"Б:24,Ж:28,У:28"},
  {"name":"Макароны с сыром и томатом","calories":460,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"макароны 80 г, сыр твёрдый 50 г, томатная паста 2 ст.л., масло 1 ч.л.","recipe":"1. Макароны отварить.\n2. Томатную пасту развести 3 ст. л. воды, прогреть.\n3. Смешать с макаронами, посыпать сыром.\n4. Запечь 5 минут при 200°C.","bju":"Б:18,Ж:16,У:62"},
  {"name":"Гречневая каша с тушёнкой","calories":500,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"гречка 100 г, тушёнка говяжья 150 г, лук, масло 1 ч.л.","recipe":"1. Гречку сварить.\n2. Лук обжарить, добавить тушёнку, прогреть.\n3. Смешать с гречкой.\n4. Подавать.","bju":"Б:26,Ж:22,У:52"},
  {"name":"Овсяная каша с бананом и орехами","calories":420,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"овсяные хлопья 60 г, молоко 200 мл, банан 1 шт., орехи 30 г","recipe":"1. Сварить овсянку на молоке.\n2. Банан нарезать кружками.\n3. Выложить в кашу, посыпать орехами.\n4. Подавать.","bju":"Б:12,Ж:14,У:70"},
  {"name":"Сырники из творога с изюмом","calories":450,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"творог 5% 150 г, мука 40 г, яйцо 1 шт., изюм 30 г, сахар","recipe":"1. Творог смешать с яйцом, мукой, изюмом, сахаром.\n2. Сформировать сырники.\n3. Обжарить на сухой сковороде.\n4. Подавать со сметаной (не входит).","bju":"Б:26,Ж:10,У:60"},
  {"name":"Фруктовый смузи с йогуртом и гранолой","calories":480,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"йогурт 150 мл, банан, ягоды 100 г, гранола 30 г","recipe":"1. Йогурт, банан и ягоды взбить блендером.\n2. Перелить в стакан.\n3. Сверху посыпать гранолой.\n4. Подавать сразу.","bju":"Б:8,Ж:6,У:90"},
  {"name":"Картофельная запеканка с фаршем","calories":490,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 250 г, фарш свиной 100 г, лук, яйцо, сметана 50 мл","recipe":"1. Картофель отварить, сделать пюре.\n2. Фарш обжарить с луком.\n3. Выложить слоями, залить сметаной с яйцом.\n4. Запекать 30 минут при 180°C.","bju":"Б:22,Ж:24,У:48"},
  {"name":"Плов с курицей","calories":480,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"рис 100 г, куриное бедро 120 г, морковь, лук, масло 2 ст.л.","recipe":"1. Мясо обжарить.\n2. Добавить нарезанные морковь, лук.\n3. Всыпать рис, залить 200 мл воды.\n4. Тушить 25 минут.","bju":"Б:24,Ж:16,У:62"},
  {"name":"Гороховый суп с копчёной грудинкой","calories":460,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"горох 100 г, копчёная грудинка 100 г, картофель 150 г, лук","recipe":"1. Горох замочить, варить 30 минут.\n2. Добавить грудинку и картофель.\n3. Варить ещё 30 минут.\n4. Посолить.","bju":"Б:28,Ж:18,У:50"},
  {"name":"Овощное рагу с картофелем","calories":440,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"картофель 200 г, кабачки 150 г, помидоры 100 г, масло 1 ст.л.","recipe":"1. Всё нарезать кубиками.\n2. Картофель обжарить 5 минут.\n3. Добавить остальные овощи, 100 мл воды.\n4. Тушить 25 минут.","bju":"Б:6,Ж:6,У:70"},
  {"name":"Тыквенная запеканка с манкой","calories":470,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"тыква 200 г, манка 50 г, яйца 2 шт., сахар, масло 1 ч.л.","recipe":"1. Тыкву натереть, смешать с манкой, яйцами, сахаром.\n2. Выложить в смазанную маслом форму.\n3. Запекать 30 минут при 180°C.\n4. Остудить 10 минут.","bju":"Б:10,Ж:8,У:80"},
  {"name":"Салат с киноа и нутом","calories":460,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"киноа 60 г, нут консерв. 100 г, помидоры, огурец, лимон","recipe":"1. Киноа отварить.\n2. Овощи нарезать, смешать с нутом и киноа.\n3. Заправить лимонным соком.\n4. Посолить.","bju":"Б:16,Ж:8,У:70"},
  {"name":"Тушёная капуста с мясом","calories":470,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"капуста 250 г, свинина 100 г, лук, морковь, томат","recipe":"1. Свинину обжарить.\n2. Добавить лук, морковь.\n3. Всыпать нашинкованную капусту, томат, 100 мл воды.\n4. Тушить 1,5 часа.","bju":"Б:20,Ж:22,У:38"},
  {"name":"Фасолевый суп с копчёностями","calories":490,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"фасоль 100 г, копчёные рёбрышки 100 г, картофель 150 г","recipe":"1. Фасоль замочить, варить 40 минут.\n2. Добавить рёбрышки и картофель.\n3. Варить ещё 40 минут.\n4. Посолить по вкусу.","bju":"Б:28,Ж:14,У:56"},
  {"name":"Перловка с тушёнкой и грибами","calories":480,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"перловка 100 г, тушёнка 100 г, шампиньоны 100 г, лук","recipe":"1. Перловку отварить.\n2. Грибы и лук обжарить.\n3. Добавить тушёнку, прогреть.\n4. Смешать с перловкой.","bju":"Б:24,Ж:18,У:60"},
  {"name":"Постный свекольник с фасолью","calories":430,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла 200 г, фасоль 100 г, картофель 100 г","recipe":"1. Фасоль отварить.\n2. Свёклу натереть, картофель нарезать, сварить.\n3. Смешать, охладить.\n4. Подавать холодным с зеленью.","bju":"Б:14,Ж:2,У:72"},
  {"name":"Овощные голубцы","calories":460,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"капуста, рис 80 г, морковь, лук, томат","recipe":"1. Капустные листья отварить.\n2. Рис сварить, смешать с обжаренными овощами.\n3. Завернуть начинку в листья.\n4. Уложить в кастрюлю, залить томатным соусом, тушить 40 минут.","bju":"Б:6,Ж:4,У:85"},
  {"name":"Грибная запеканка с картофелем","calories":470,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"картофель 200 г, шампиньоны 150 г, яйца 2 шт., масло 1 ч.л.","recipe":"1. Картофель нарезать кружками, грибы пластинами.\n2. Выложить слоями, залить взбитыми яйцами.\n3. Смазать форму маслом.\n4. Запекать 35 минут при 180°C.","bju":"Б:12,Ж:10,У:65"},
  {"name":"Курица в сливочном соусе с пастой","calories":490,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"куриное филе 120 г, паста 80 г, сливки 50 мл, сыр 30 г","recipe":"1. Пасту отварить.\n2. Филе обжарить, нарезать.\n3. Влить сливки, добавить сыр.\n4. Смешать с пастой.","bju":"Б:30,Ж:16,У:50"},
  {"name":"Омлет с ветчиной и сыром","calories":470,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яйца 3 шт., ветчина 80 г, сыр 40 г, масло 1 ч.л.","recipe":"1. Яйца взбить.\n2. Ветчину нарезать, сыр натереть.\n3. Вылить яйца на сковороду с маслом, добавить ветчину.\n4. Посыпать сыром, жарить под крышкой 5 минут.","bju":"Б:28,Ж:26,У:6"},
  {"name":"Бургер с индейкой","calories":500,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"булочка, котлета из индейки 100 г, салат, помидор, соус","recipe":"1. Котлету обжарить на гриле.\n2. Булочку разрезать, подсушить.\n3. Собрать бургер с листьями салата, кружком помидора, соусом.\n4. Подавать.","bju":"Б:26,Ж:18,У:48"},
  {"name":"Салат с лососем и авокадо","calories":430,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"лосось слабосолёный 80 г, авокадо ½ шт., салат, лимон","recipe":"1. Лосось нарезать ломтиками, авокадо кубиками.\n2. Выложить на салатные листья.\n3. Сбрызнуть лимонным соком.\n4. Подавать.","bju":"Б:18,Ж:24,У:12"},
  {"name":"Греческий йогурт с фруктами и мюсли","calories":460,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"греческий йогурт 150 г, мюсли 40 г, свежие фрукты","recipe":"1. Фрукты нарезать.\n2. В стакан слоями выложить йогурт, мюсли, фрукты.\n3. Повторить слои.\n4. Подавать.","bju":"Б:14,Ж:10,У:68"},
  {"name":"Смузи из авокадо и шпината","calories":470,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"авокадо ½ шт., шпинат 50 г, яблоко, вода","recipe":"1. Авокадо, шпинат, яблоко нарезать.\n2. Взбить с водой до однородности.\n3. При желании добавить мёд.\n4. Пить свежим.","bju":"Б:4,Ж:18,У:55"},
  {"name":"Куриная грудка с киноа и овощами","calories":480,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка 120 г, киноа 60 г, брокколи, морковь","recipe":"1. Киноа отварить.\n2. Грудку обжарить, нарезать.\n3. Овощи сварить на пару.\n4. Подавать вместе.","bju":"Б:34,Ж:8,У:44"},
  {"name":"Запечённая рыба с картофелем","calories":490,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"филе горбуши 120 г, картофель 200 г, масло 1 ст.л.","recipe":"1. Картофель нарезать дольками, смешать с маслом.\n2. Выложить на противень, сверху рыбу.\n3. Запекать 35 минут при 200°C.\n4. Посолить, подавать.","bju":"Б:28,Ж:14,У:50"},

  {"name":"Курица в кисло-сладком соусе с рисом","calories":580,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"куриное филе 120 г, рис 80 г, ананас, перец, соус, масло 1 ст.л.","recipe":"1. Рис отварить.\n2. Курицу обжарить, добавить перец, ананас.\n3. Влить готовый кисло-сладкий соус.\n4. Подавать с рисом.","bju":"Б:28,Ж:10,У:72"},

  {"name":"Омлет с лососем и сыром","calories":560,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яйца 3 шт., лосось слабосолёный 80 г, сыр 40 г, масло 1 ч.л.","recipe":"1. Яйца взбить.\n2. Вылить на сковороду с маслом, добавить кусочки лосося.\n3. Посыпать тёртым сыром.\n4. Жарить под крышкой 5 минут.","bju":"Б:30,Ж:28,У:8"},
  {"name":"Салат с креветками, авокадо и грейпфрутом","calories":520,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"креветки 100 г, авокадо ½ шт., грейпфрут ½ шт., салат, масло 1 ч.л.","recipe":"1. Креветки отварить.\n2. Авокадо и грейпфрут очистить, нарезать.\n3. Смешать с салатом.\n4. Заправить маслом.","bju":"Б:22,Ж:18,У:30"},
  {"name":"Греческий йогурт с мюсли и фруктами","calories":540,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"греческий йогурт 150 г, мюсли 50 г, свежие ягоды 100 г, мёд","recipe":"1. Йогурт выложить в креманку.\n2. Посыпать мюсли, ягодами.\n3. Полить мёдом.\n4. Подавать.","bju":"Б:14,Ж:12,У:78"},
  {"name":"Смузи из манго, банана и кокосового молока","calories":570,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"манго 100 г, банан 1 шт., кокосовое молоко 150 мл","recipe":"1. Фрукты нарезать.\n2. Взбить с кокосовым молоком.\n3. Перелить в стакан.\n4. Пить охлаждённым.","bju":"Б:4,Ж:14,У:90"},
  {"name":"Куриная грудка с гречкой и грибным соусом","calories":580,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка 120 г, гречка 80 г, шампиньоны 100 г, сливки 50 мл","recipe":"1. Гречку сварить.\n2. Грудку обжарить.\n3. Грибы потушить, добавить сливки.\n4. Подавать грудку с гречкой и соусом.","bju":"Б:36,Ж:14,У:60"},
  {"name":"Запечённая форель с картофелем","calories":590,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"форель 150 г, картофель 200 г, лимон, масло 1 ст.л.","recipe":"1. Картофель нарезать дольками, смешать с маслом.\n2. Выложить в форму, сверху рыбу, лимон.\n3. Запекать 35 минут при 200°C.\n4. Подавать.","bju":"Б:32,Ж:18,У:52"},
  {"name":"Паста с морепродуктами в сливочном соусе","calories":600,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"паста 80 г, креветки, мидии 120 г, сливки 50 мл, чеснок","recipe":"1. Пасту отварить.\n2. Морепродукты обжарить с чесноком.\n3. Влить сливки, довести до кипения.\n4. Смешать с пастой.","bju":"Б:26,Ж:14,У:72"},
  {"name":"Крем-суп из цветной капусты с сыром","calories":520,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"цветная капуста 250 г, сыр плавленый 50 г, бульон","recipe":"1. Капусту сварить в бульоне.\n2. Взбить блендером.\n3. Добавить сыр, размешать до растворения.\n4. Прогреть.","bju":"Б:14,Ж:16,У:30"},
  {"name":"Салат с копчёной курицей и ананасом","calories":540,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"куриная грудка копчёная 100 г, ананас консерв. 100 г, салат, майонез 1 ст.л.","recipe":"1. Курицу и ананас нарезать кубиками.\n2. Смешать с порванным салатом.\n3. Заправить майонезом.\n4. Перемешать.","bju":"Б:22,Ж:18,У:40"},
  {"name":"Запечённые баклажаны с фетой и помидорами","calories":560,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"баклажаны 2 шт., фета 80 г, помидоры 2 шт., масло 1 ст.л.","recipe":"1. Баклажаны нарезать кружками, запечь 10 минут.\n2. Сверху выложить кружки помидоров, раскрошенную фету.\n3. Сбрызнуть маслом, запекать ещё 15 минут.\n4. Подавать.","bju":"Б:14,Ж:24,У:38"},
  {"name":"Свинина тушёная с капустой","calories":590,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"свинина 150 г, капуста 250 г, лук, томат, масло 1 ст.л.","recipe":"1. Свинину обжарить.\n2. Добавить лук, томат.\n3. Всыпать нашинкованную капусту, влить 100 мл воды.\n4. Тушить 1,5 часа.","bju":"Б:28,Ж:26,У:48"},
  {"name":"Куриные окорочка с картофелем в духовке","calories":580,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"куриные окорочка 2 шт., картофель 250 г, специи, масло 1 ст.л.","recipe":"1. Окорочка натереть специями.\n2. Картофель нарезать, смешать с маслом.\n3. Всё выложить на противень.\n4. Запекать 1 час при 200°C.","bju":"Б:34,Ж:22,У:54"},
  {"name":"Гуляш из говядины с макаронами","calories":600,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"говядина 120 г, макароны 80 г, лук, паприка, томат","recipe":"1. Говядину потушить с луком и томатом 1,5 часа.\n2. Макароны отварить.\n3. Смешать.\n4. Подавать.","bju":"Б:30,Ж:14,У:72"},
  {"name":"Овощное рагу с грибами и сметаной","calories":530,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"кабачки, баклажаны, шампиньоны — всего 400 г, сметана 50 мл","recipe":"1. Овощи и грибы нарезать, потушить 20 минут.\n2. Добавить сметану, соль.\n3. Прогреть 5 минут.\n4. Подавать.","bju":"Б:8,Ж:10,У:60"},
  {"name":"Фаршированные перцы с рисом и мясом","calories":560,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"перец болгарский 3 шт., рис 60 г, фарш 80 г, томатный соус","recipe":"1. Рис отварить, смешать с обжаренным фаршем.\n2. Начинить перцы.\n3. Уложить в кастрюлю, залить томатным соусом.\n4. Тушить 40 минут.","bju":"Б:18,Ж:14,У:70"},
  {"name":"Картофельные зразы с грибами","calories":580,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"картофель 300 г, шампиньоны 100 г, лук, яйцо, мука","recipe":"1. Картофель отварить, размять, добавить муку, яйцо.\n2. Грибы с луком обжарить.\n3. Сделать лепёшки, в центр начинку, сформировать зразы.\n4. Обжарить на сухой сковороде.","bju":"Б:12,Ж:16,У:80"},
  {"name":"Стейк из лосося с картофельным пюре и спаржей","calories":590,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"стейк лосося 120 г, картофель 200 г, спаржа 100 г, масло 1 ст.л.","recipe":"1. Картофель отварить, размять с маслом.\n2. Спаржу бланшировать 3 минуты.\n3. Лосось обжарить по 3 минуты.\n4. Подавать вместе.","bju":"Б:30,Ж:24,У:50"},
  {"name":"Креветки в томатно-чесночном соусе с рисом","calories":580,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки 120 г, рис 80 г, томаты в с/с 100 г, чеснок, масло 1 ст.л.","recipe":"1. Рис отварить.\n2. Чеснок обжарить, добавить томаты, потушить.\n3. Добавить креветки, готовить 3 минуты.\n4. Подавать с рисом.","bju":"Б:28,Ж:8,У:76"},
  {"name":"Фуа-гра с карамелизованными яблоками","calories":600,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"фуа-гра 60 г, яблоко 1 шт., сахар, масло","recipe":"1. Яблоко нарезать дольками, обжарить с сахаром.\n2. Фуа-гра обжарить по 1 минуте.\n3. Подавать вместе.\n4. Украсить зеленью.","bju":"Б:12,Ж:36,У:38"},
  {"name":"Тартар из лосося с манго и авокадо","calories":520,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"лосось 80 г, манго 50 г, авокадо ½ шт., лайм","recipe":"1. Всё нарезать кубиками.\n2. Смешать, заправить соком лайма.\n3. Посолить.\n4. Подавать.","bju":"Б:18,Ж:20,У:32"},
  {"name":"Сашими из тунца и лосося","calories":540,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"тунец 60 г, лосось 60 г, васаби, соевый соус","recipe":"1. Рыбу нарезать ломтиками.\n2. Выложить на тарелку.\n3. Подавать с васаби и соевым соусом.\n4. Есть палочками.","bju":"Б:26,Ж:14,У:6"},
  {"name":"Морской гребешок с цитрусовым соусом","calories":560,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки 100 г, апельсин, лимон, масло 1 ч.л.","recipe":"1. Гребешки обжарить на масле.\n2. Из сока апельсина и лимона сделать соус, уварить.\n3. Полить гребешки.\n4. Подавать.","bju":"Б:22,Ж:8,У:30"},
  {"name":"Филе сибаса с ризотто из киноа","calories":580,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"филе сибаса 120 г, киноа 60 г, бульон, масло 1 ст.л.","recipe":"1. Киноа обжарить, постепенно добавить бульон, готовить 15 минут.\n2. Рыбу посолить, запечь 15 минут.\n3. Подавать рыбу на ризотто.\n4. Сбрызнуть маслом.","bju":"Б:32,Ж:12,У:54"},
  {"name":"Стейк из тунца с овощами гриль","calories":590,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"стейк тунца 120 г, цукини, перец, масло 1 ст.л.","recipe":"1. Овощи нарезать, смазать маслом.\n2. Тунца посолить.\n3. Обжарить всё на гриле: тунец по 2 минуты, овощи до мягкости.\n4. Подавать.","bju":"Б:34,Ж:14,У:24"},
  {"name":"Лобстер с картофельным гратеном","calories":600,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"хвост лобстера 100 г, картофель 200 г, сливки 50 мл, сыр 30 г","recipe":"1. Картофель тонко нарезать, залить сливками, посыпать сыром, запечь 30 минут.\n2. Лобстера отварить 5 минут.\n3. Подавать вместе.\n4. Украсить.","bju":"Б:30,Ж:18,У:56"},
  {"name":"Салат с морепродуктами и авокадо","calories":530,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"кальмар, креветки 100 г, авокадо ½ шт., салат, лимон","recipe":"1. Морепродукты отварить.\n2. Авокадо нарезать.\n3. Смешать с салатом.\n4. Заправить лимонным соком.","bju":"Б:24,Ж:18,У:22"},
  {"name":"Запечённые устрицы с сыром и шпинатом","calories":550,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"устрицы 6 шт., шпинат 50 г, сыр 40 г, масло 1 ч.л.","recipe":"1. Устриц открыть.\n2. Шпинат припустить, выложить на устрицы.\n3. Посыпать сыром, запекать 10 минут.\n4. Подавать.","bju":"Б:22,Ж:20,У:12"},
  {"name":"Ризотто с лисичками и пармезаном","calories":570,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"рис арборио 70 г, лисички 80 г, пармезан 40 г, бульон","recipe":"1. Лисички обжарить.\n2. Рис обжарить, добавлять бульон, варить 18 минут.\n3. Вмешать лисички, пармезан.\n4. Дать отдохнуть 2 минуты.","bju":"Б:16,Ж:16,У:68"},
  {"name":"Говяжьи щёки в красном вине","calories":580,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"говяжьи щёки 150 г, красное вино 150 мл, овощи","recipe":"1. Щёки обжарить.\n2. Залить вином, добавить овощи.\n3. Тушить 3 часа.\n4. Подавать с соусом.","bju":"Б:32,Ж:22,У:14"},
  {"name":"Баранья нога с розмарином и чесноком","calories":590,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"баранина 200 г, чеснок, розмарин, масло","recipe":"1. Баранину нашпиговать чесноком, натереть розмарином.\n2. Запекать при 160°C 2 часа.\n3. Дать отдохнуть.\n4. Нарезать.","bju":"Б:34,Ж:30,У:10"},
  {"name":"Утка с яблоками и черносливом","calories":600,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"утка 200 г, яблоки 2 шт., чернослив 50 г, специи","recipe":"1. Утку натереть специями, нафаршировать яблоками и черносливом.\n2. Запекать при 180°C 1,5–2 часа.\n3. Поливать выделяющимся соком.\n4. Подавать.","bju":"Б:32,Ж:34,У:28"},
  {"name":"Овощной террин с козьим сыром","calories":540,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"баклажаны, цукини, перец, козий сыр 80 г, яйца","recipe":"1. Овощи нарезать, запечь.\n2. Яйца взбить.\n3. В форму слоями выложить овощи, сыр, залить яйцами.\n4. Запекать 1 час при 150°C.","bju":"Б:14,Ж:20,У:36"},
  {"name":"Фаршированные кальмары с рисом и овощами","calories":560,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"кальмары 150 г, рис 50 г, помидоры, лук, томатный соус","recipe":"1. Рис отварить, овощи обжарить.\n2. Смешать начинку, начинить кальмары.\n3. Уложить в сотейник, залить соусом.\n4. Тушить 30 минут.","bju":"Б:26,Ж:8,У:50"},
  {"name":"Грибной строганов со сметаной","calories":580,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"шампиньоны 200 г, лук, сметана 20% 80 г, мука, масло","recipe":"1. Грибы и лук обжарить.\n2. Посыпать мукой, перемешать.\n3. Влить сметану, 50 мл воды.\n4. Тушить 10 минут.","bju":"Б:10,Ж:24,У:22"},

  {"name":"Картофель жареный с яйцом","calories":680,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"картофель 300 г, яйца 3 шт., масло растительное 2 ст.л., соль","recipe":"1. Картофель нарезать брусочками, обжарить на масле до золотистой корочки.\n2. Яйца взбить, посолить.\n3. Залить яйцами картофель, перемешивая, жарить до схватывания яиц.\n4. Подавать горячим.","bju":"Б:18,Ж:32,У:70"},
  {"name":"Макароны с фаршем и томатным соусом","calories":650,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"макароны 100 г, фарш свино-говяжий 100 г, лук, томатная паста 2 ст.л., масло 1 ст.л.","recipe":"1. Макароны отварить.\n2. Лук обжарить, добавить фарш, готовить 10 минут.\n3. Добавить томатную пасту, 100 мл воды, потушить 10 минут.\n4. Смешать с макаронами.","bju":"Б:26,Ж:24,У:72"},
  {"name":"Гречка с жареной куриной печенью и луком","calories":630,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"гречка 100 г, куриная печень 150 г, лук 2 шт., масло 2 ст.л.","recipe":"1. Гречку отварить.\n2. Лук обжарить на масле до золотистости, добавить печень.\n3. Жарить 8-10 минут.\n4. Смешать с гречкой.","bju":"Б:32,Ж:22,У:60"},
  {"name":"Овсяная каша с сухофруктами и орехами","calories":620,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"овсяные хлопья 80 г, молоко 300 мл, курага, изюм, орехи — всего 80 г, мёд","recipe":"1. Овсянку сварить на молоке.\n2. Сухофрукты нарезать, орехи порубить.\n3. Добавить в кашу, полить мёдом.\n4. Подавать.","bju":"Б:16,Ж:14,У:100"},
  {"name":"Творожная запеканка с бананом и манкой","calories":640,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"творог 5% 200 г, манка 50 г, яйца 2 шт., банан 1 шт., сахар","recipe":"1. Банан размять, смешать с творогом, яйцами, манкой, сахаром.\n2. Выложить в форму.\n3. Запекать 30 минут при 180°C.\n4. Остудить.","bju":"Б:28,Ж:12,У:90"},
  {"name":"Фруктовый смузи с йогуртом и гранолой","calories":660,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"банан, яблоко, груша — всего 300 г, йогурт 200 мл, гранола 50 г, мёд","recipe":"1. Фрукты взбить с йогуртом и мёдом.\n2. Перелить в стакан.\n3. Посыпать гранолой.\n4. Подавать.","bju":"Б:10,Ж:8,У:130"},
  {"name":"Картофельная запеканка с фаршем и сметаной","calories":680,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 300 г, фарш мясной 120 г, лук, сметана 100 г, сыр 40 г, масло 1 ст.л.","recipe":"1. Картофель отварить, сделать пюре.\n2. Фарш обжарить с луком.\n3. Выложить слоями, залить сметаной, посыпать сыром.\n4. Запекать 30 минут при 200°C.","bju":"Б:28,Ж:30,У:68"},
  {"name":"Плов с курицей и нутом","calories":650,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"рис 100 г, куриное бедро 120 г, нут консерв. 100 г, морковь, лук, масло 2 ст.л.","recipe":"1. Курицу обжарить, добавить лук, морковь.\n2. Всыпать рис, нут, залить водой.\n3. Тушить 25 минут.\n4. Перемешать.","bju":"Б:30,Ж:18,У:76"},
  {"name":"Гороховый суп с копчёной грудинкой","calories":620,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"горох колотый 100 г, копчёная грудинка 100 г, картофель 200 г, лук, морковь","recipe":"1. Горох замочить, варить 30 минут.\n2. Добавить грудинку, овощи.\n3. Варить ещё 40 минут.\n4. Посолить.","bju":"Б:28,Ж:20,У:68"},

  {"name":"Жареная картошка с салом","calories":780,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"картофель 300 г, сало 50 г, лук, соль","recipe":"1. Сало нарезать мелкими кубиками, вытопить жир на сковороде.\n2. Добавить нарезанный лук, обжарить.\n3. Картофель нарезать брусочками, выложить в сковороду, жарить до румяности, периодически помешивая.\n4. Посолить в конце.","bju":"Б:10,Ж:42,У:80"},
  {"name":"Макароны с фаршем и сыром","calories":750,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"макароны 100 г, фарш говяжий 120 г, лук, томатная паста 2 ст.л., сыр 50 г, масло 1 ст.л.","recipe":"1. Макароны отварить.\n2. Фарш обжарить с луком, добавить томатную пасту, 100 мл воды, потушить 10 минут.\n3. Смешать с макаронами, выложить в форму.\n4. Посыпать тёртым сыром, запечь 10 минут при 200°C.","bju":"Б:32,Ж:24,У:82"},
  {"name":"Гречка с тушёнкой и жареным луком","calories":730,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"гречка 100 г, тушёнка говяжья 150 г, лук 2 шт., масло 1 ст.л.","recipe":"1. Гречку отварить.\n2. Лук нарезать полукольцами, обжарить на масле до золотистости.\n3. Добавить тушёнку, прогреть, разминая кусочки.\n4. Смешать с гречкой.","bju":"Б:30,Ж:28,У:70"},
  {"name":"Блинчики с творогом и сметаной","calories":720,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"блины 3 шт., творог 5% 150 г, сметана 50 г, сахар, изюм","recipe":"1. Испечь тонкие блины (мука, яйцо, молоко).\n2. Творог смешать с сахаром, изюмом.\n3. Начинить блины, свернуть конвертиком.\n4. Подавать со сметаной.","bju":"Б:24,Ж:18,У:100"},
  {"name":"Овсяная каша с маслом и сухофруктами","calories":740,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"овсяные хлопья 80 г, молоко 300 мл, масло сливочное 10 г, курага, чернослив, изюм — всего 80 г","recipe":"1. Овсянку сварить на молоке.\n2. Добавить масло, нарезанные сухофрукты.\n3. Перемешать, дать настояться 3 минуты.\n4. Подавать.","bju":"Б:14,Ж:16,У:120"},
  {"name":"Фруктовый салат с орехами и сметанным кремом","calories":760,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"банан, яблоко, апельсин — всего 300 г, грецкие орехи 50 г, сметана 20% 80 г, сахар","recipe":"1. Фрукты нарезать кубиками.\n2. Орехи порубить.\n3. Сметану взбить с сахаром.\n4. Заправить фрукты, посыпать орехами.","bju":"Б:8,Ж:22,У:130"},
  {"name":"Картофельная запеканка с мясом и грибами","calories":780,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 300 г, фарш 100 г, шампиньоны 100 г, лук, сметана 100 г, сыр 50 г","recipe":"1. Картофель отварить, нарезать кружками.\n2. Фарш и грибы обжарить с луком.\n3. Слоями выложить в форму, залить сметаной, посыпать сыром.\n4. Запекать 30 минут при 200°C.","bju":"Б:28,Ж:30,У:78"},
  {"name":"Плов с курицей и сухофруктами","calories":750,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"рис 100 г, куриное бедро 150 г, морковь, лук, курага, изюм 50 г, масло 2 ст.л.","recipe":"1. Курицу обжарить, добавить лук, морковь.\n2. Всыпать рис, сухофрукты, залить водой.\n3. Тушить 25 минут.\n4. Перемешать, подавать.","bju":"Б:28,Ж:22,У:90"},
  {"name":"Гороховый суп с копчёной рулькой","calories":720,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"горох колотый 100 г, копчёная рулька 100 г, картофель 200 г, лук, морковь","recipe":"1. Горох замочить, варить 30 минут.\n2. Добавить рульку, картофель, овощи.\n3. Варить ещё 1 час.\n4. Мясо отделить от кости, вернуть в суп.","bju":"Б:30,Ж:24,У:76"},
  {"name":"Овощное рагу с картофелем и грибами","calories":740,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"картофель 200 г, кабачки 150 г, шампиньоны 150 г, помидоры, лук, масло 2 ст.л.","recipe":"1. Все овощи и грибы нарезать.\n2. Обжарить картофель 5 минут, добавить остальное.\n3. Влить 100 мл воды, тушить 25 минут.\n4. Посолить, поперчить.","bju":"Б:10,Ж:12,У:110"},
  {"name":"Тыквенная каша с рисом и изюмом","calories":720,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"тыква 250 г, рис 80 г, молоко 200 мл, изюм 50 г, масло сливочное 10 г, сахар","recipe":"1. Тыкву нарезать, рис промыть, варить в воде 15 минут.\n2. Добавить молоко, изюм, масло, сахар.\n3. Варить до готовности риса.\n4. Подавать.","bju":"Б:8,Ж:8,У:140"},
  {"name":"Салат с курицей, фасолью и сухариками","calories":760,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"куриная грудка отварная 100 г, фасоль консерв. 150 г, сухарики 40 г, майонез 2 ст.л.","recipe":"1. Курицу нарезать кубиками.\n2. Смешать с фасолью.\n3. Добавить сухарики, майонез.\n4. Перемешать, сразу подавать.","bju":"Б:28,Ж:22,У:90"},
  {"name":"Тушёная свинина с картофелем и капустой","calories":790,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"свинина 150 г, картофель 250 г, капуста 200 г, лук, томат, масло 2 ст.л.","recipe":"1. Свинину обжарить.\n2. Добавить лук, томат, воду, тушить 30 минут.\n3. Добавить картофель, капусту.\n4. Тушить ещё 1 час.","bju":"Б:30,Ж:32,У:78"},
  {"name":"Фасолевый суп с копчёными рёбрышками","calories":730,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"фасоль 100 г, копчёные рёбрышки 120 г, картофель 200 г, лук, морковь","recipe":"1. Фасоль замочить, отварить 30 минут.\n2. Добавить рёбрышки, картофель, овощи.\n3. Варить ещё 40 минут.\n4. Посолить.","bju":"Б:28,Ж:20,У:80"},
  {"name":"Перловка с тушёнкой и жареным луком","calories":760,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"перловка 100 г, тушёнка 120 г, лук 2 шт., масло 2 ст.л.","recipe":"1. Перловку отварить.\n2. Лук обжарить, добавить тушёнку.\n3. Смешать с перловкой.\n4. Прогреть 5 минут.","bju":"Б:26,Ж:24,У:82"},
  {"name":"Постный борщ с фасолью и черносливом","calories":710,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла 200 г, капуста 150 г, фасоль 100 г, чернослив 50 г, лук","recipe":"1. Фасоль отварить.\n2. Свёклу, капусту нашинковать, чернослив промыть.\n3. Всё залить водой, варить 40 минут.\n4. Посолить.","bju":"Б:12,Ж:2,У:130"},
  {"name":"Овощные котлеты с грибным соусом","calories":740,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"картофель, морковь, кабачки — всего 400 г, мука 40 г, яйцо 1 шт., шампиньоны 100 г, сметана 50 мл","recipe":"1. Овощи натереть, отжать, смешать с мукой, яйцом.\n2. Сформировать котлеты, обжарить.\n3. Грибы потушить, добавить сметану, измельчить блендером.\n4. Подавать котлеты с соусом.","bju":"Б:12,Ж:14,У:110"},
  {"name":"Капустная запеканка с мясным фаршем","calories":750,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"капуста 300 г, фарш 100 г, яйца 2 шт., мука 30 г, сметана 50 мл","recipe":"1. Капусту потушить, остудить.\n2. Фарш обжарить.\n3. Смешать с яйцами, мукой, залить сметаной.\n4. Запекать 35 минут при 180°C.","bju":"Б:20,Ж:18,У:100"},
  // cost 2, кал 700-800
  {"name":"Курица в сливочном соусе с пастой и грибами","calories":780,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"куриное филе 150 г, паста 80 г, шампиньоны 100 г, сливки 20% 80 мл, сыр 30 г","recipe":"1. Пасту отварить.\n2. Курицу и грибы обжарить.\n3. Влить сливки, добавить сыр, потушить 3 минуты.\n4. Смешать с пастой.","bju":"Б:36,Ж:24,У:72"},
  {"name":"Омлет с беконом и помидорами","calories":740,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яйца 4 шт., бекон 80 г, помидор 1 шт., сыр 40 г, масло 1 ч.л.","recipe":"1. Бекон обжарить до хруста.\n2. Помидор нарезать, добавить.\n3. Залить взбитыми яйцами, посыпать сыром.\n4. Жарить под крышкой 5 минут.","bju":"Б:30,Ж:40,У:10"},
  {"name":"Бургер с говяжьей котлетой и картофелем фри","calories":800,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"булочка, котлета 120 г, сыр, салат, соус, картофель 150 г, масло для фритюра","recipe":"1. Котлету обжарить до готовности.\n2. Картофель нарезать брусочками, обжарить во фритюре.\n3. Булочку разрезать, подсушить.\n4. Собрать бургер с сыром, салатом, соусом, подать с картофелем.","bju":"Б:32,Ж:34,У:78"},
  {"name":"Салат с креветками, авокадо и яйцом","calories":720,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"креветки 100 г, авокадо ½ шт., яйца 2 шт., салат, масло 1 ст.л., лимон","recipe":"1. Креветки и яйца отварить, яйца нарезать дольками.\n2. Авокадо нарезать.\n3. Всё смешать с салатом, заправить маслом и лимонным соком.\n4. Подавать.","bju":"Б:28,Ж:30,У:30"},
  {"name":"Греческий йогурт с гранолой, орехами и мёдом","calories":740,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"греческий йогурт 200 г, гранола 70 г, орехи 40 г, мёд 2 ст.л.","recipe":"1. Йогурт выложить в миску.\n2. Посыпать гранолой, орехами.\n3. Полить мёдом.\n4. Подавать.","bju":"Б:18,Ж:22,У:100"},
  {"name":"Смузи из авокадо, банана и миндального молока","calories":760,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"авокадо ½ шт., банан 1 шт., миндальное молоко 200 мл, мёд","recipe":"1. Фрукты очистить, нарезать.\n2. Взбить с миндальным молоком и мёдом.\n3. Перелить в стакан.\n4. Пить.","bju":"Б:6,Ж:22,У:90"},
  {"name":"Куриная грудка с гречкой и сливочно-грибным соусом","calories":780,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка 150 г, гречка 80 г, шампиньоны 100 г, сливки 20% 60 мл, масло 1 ст.л.","recipe":"1. Гречку сварить.\n2. Грудку обжарить.\n3. Грибы потушить, добавить сливки, соль, перец.\n4. Подавать с гречкой и соусом.","bju":"Б:38,Ж:20,У:76"},
  {"name":"Запечённая форель с картофелем и сыром","calories":790,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"форель 150 г, картофель 200 г, сыр 50 г, масло 1 ст.л.","recipe":"1. Картофель отварить до полуготовности, нарезать.\n2. Выложить в форму, сверху рыбу, сыр.\n3. Запекать 25 минут при 200°C.\n4. Подавать.","bju":"Б:34,Ж:22,У:70"},
  {"name":"Паста с морепродуктами и томатным соусом","calories":800,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"паста 80 г, креветки, мидии, кальмар — 150 г, томаты в с/с 150 г, чеснок, масло 1 ст.л.","recipe":"1. Пасту отварить.\n2. Морепродукты обжарить, добавить томаты.\n3. Смешать с пастой.\n4. Прогреть.","bju":"Б:32,Ж:14,У:92"},
  {"name":"Крем-суп из тыквы с имбирём и сливками","calories":720,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"тыква 300 г, имбирь, сливки 20% 80 мл, бульон","recipe":"1. Тыкву и имбирь сварить.\n2. Взбить, добавить сливки.\n3. Прогреть, не кипятить.\n4. Подавать.","bju":"Б:6,Ж:12,У:80"},
  {"name":"Салат с копчёной курицей, виноградом и орехами","calories":740,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"куриная грудка копчёная 100 г, виноград 100 г, грецкие орехи 40 г, сметана 2 ст.л.","recipe":"1. Курицу и виноград нарезать.\n2. Орехи порубить.\n3. Смешать, заправить сметаной.\n4. Подавать.","bju":"Б:24,Ж:28,У:50"},
  {"name":"Запечённые баклажаны с сыром фета и томатами","calories":760,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"баклажаны 2 шт., фета 100 г, помидоры 2 шт., масло 1 ст.л.","recipe":"1. Баклажаны и помидоры нарезать кружками.\n2. Выложить слоями, раскрошить фету.\n3. Сбрызнуть маслом.\n4. Запекать 20 минут при 200°C.","bju":"Б:14,Ж:30,У:48"},
  {"name":"Свинина тушёная с капустой и картофелем","calories":790,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"свинина 150 г, капуста 250 г, картофель 250 г, лук, томат, масло 2 ст.л.","recipe":"1. Свинину обжарить, добавить лук, томат.\n2. Влить 200 мл воды, тушить 30 минут.\n3. Добавить капусту, картофель.\n4. Тушить ещё 1 час.","bju":"Б:32,Ж:30,У:78"},
  {"name":"Куриные окорочка с рисом и овощами в духовке","calories":780,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"куриные окорочка 2 шт., рис 80 г, морковь, лук, масло 1 ст.л.","recipe":"1. Окорочка запечь 45 минут при 200°C.\n2. Рис отварить с морковью и луком.\n3. Подавать вместе.\n4. Полить соком от курицы.","bju":"Б:36,Ж:26,У:70"},
  {"name":"Гуляш из говядины с макаронами","calories":800,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"говядина 150 г, макароны 80 г, лук, паприка, томат, масло 1 ст.л.","recipe":"1. Говядину нарезать, обжарить, добавить лук, паприку, томат, воду.\n2. Тушить 1,5 часа.\n3. Макароны отварить.\n4. Смешать, подавать.","bju":"Б:34,Ж:20,У:82"},
  {"name":"Овощное рагу с нутом и сметаной","calories":730,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"нут консерв. 150 г, кабачки 150 г, помидоры 150 г, сметана 20% 50 мл","recipe":"1. Кабачки и помидоры нарезать, потушить 15 минут.\n2. Добавить нут, сметану.\n3. Прогреть 5 минут.\n4. Посолить.","bju":"Б:18,Ж:10,У:100"},
  {"name":"Фаршированные перцы с рисом и грибами","calories":760,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"перец болгарский 3 шт., рис 60 г, шампиньоны 100 г, лук, томатный соус 100 мл","recipe":"1. Рис отварить, грибы обжарить.\n2. Смешать, начинить перцы.\n3. Уложить в кастрюлю, залить соусом.\n4. Тушить 1 час.","bju":"Б:10,Ж:8,У:120"},
  {"name":"Картофельные зразы с мясом","calories":780,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"картофель 300 г, фарш 100 г, лук, яйцо, мука, масло 1 ст.л.","recipe":"1. Картофель отварить, размять, добавить муку, яйцо.\n2. Фарш обжарить с луком.\n3. Слепить зразы, обжарить.\n4. Подавать.","bju":"Б:22,Ж:24,У:90"},
  // cost 3, кал 700-800
  {"name":"Стейк из лосося с пюре из батата и спаржей","calories":790,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"стейк лосося 150 г, батат 200 г, спаржа 100 г, масло сливочное 10 г","recipe":"1. Батат отварить, размять с маслом.\n2. Спаржу отварить 3 минуты.\n3. Лосось обжарить.\n4. Подавать вместе.","bju":"Б:34,Ж:28,У:70"},
  {"name":"Креветки в кисло-сладком соусе с рисом","calories":780,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки 150 г, рис 80 г, ананас, перец, соус, масло 1 ст.л.","recipe":"1. Рис отварить.\n2. Креветки обжарить с перцем и ананасом.\n3. Добавить соус.\n4. Подавать с рисом.","bju":"Б:32,Ж:12,У:88"},
  {"name":"Фуа-гра с карамелизованной грушей и соусом демиглас","calories":800,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"фуа-гра 60 г, груша 1 шт., сахар, масло, соус демиглас 30 мл","recipe":"1. Грушу карамелизовать.\n2. Фуа-гра обжарить.\n3. Подавать с соусом.\n4. Блюдо высокой кухни.","bju":"Б:12,Ж:48,У:42"},
  {"name":"Тартар из тунца с авокадо и манго","calories":720,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"тунец 80 г, авокадо ½ шт., манго 50 г, лайм, соевый соус","recipe":"1. Всё нарезать кубиками.\n2. Смешать с соевым соусом и соком лайма.\n3. Выложить через кольцо.\n4. Подавать.","bju":"Б:22,Ж:18,У:50"},
  {"name":"Сашими из лосося и гребешка","calories":740,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"лосось 60 г, гребешок 60 г, васаби, имбирь, соевый соус","recipe":"1. Рыбу и гребешок нарезать.\n2. Подавать с васаби, имбирём, соусом.\n3. Украсить.\n4. Есть палочками.","bju":"Б:28,Ж:14,У:10"},
  {"name":"Морской гребешок с ризотто из цветной капусты","calories":760,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки 120 г, цветная капуста 200 г, пармезан 30 г, масло 1 ст.л.","recipe":"1. Цветную капусту измельчить в крошку, обжарить, добавить пармезан.\n2. Гребешки обжарить.\n3. Подавать на ризотто из капусты.\n4. Украсить.","bju":"Б:26,Ж:18,У:30"},

        // ========== ПОИСК ==========
        function poisk() {
            if (dishes.length === 0) { alert('Блюда ещё не загружены'); return; }
            currentFiltered = dishes.filter(d => {
                if (minKal > 0 && d.calories < minKal) return false;
                if (maxKal > 0 && d.calories > maxKal) return false;
                if (cost !== 0 && d.cost !== cost) return false;
                if (gotofnost !== 0 && d.gotofnost !== gotofnost) return false;
                if (sutnost !== 0 && d.sutnost !== sutnost) return false;
                return true;
            });
            currentPage = 0;
            document.getElementById('result').innerHTML = '';
            if (currentFiltered.length === 0) {
                document.getElementById('result').innerHTML = '<div class="no-results">😕 Ничего не найдено</div>';
                return;
            }
            showPage();
        }

        function showPage() {
            const resultDiv = document.getElementById('result');
            const oldBtn = document.getElementById('loadMoreBtn');
            if (oldBtn) oldBtn.remove();

            // Счётчик создаём только один раз – если его ещё нет
            let counter = resultDiv.querySelector('.results-counter');
            if (!counter) {
                counter = document.createElement('div');
                counter.className = 'results-counter';
                resultDiv.appendChild(counter);
            }
            counter.textContent = `🔍 Найдено: ${currentFiltered.length} блюд по вашим критериям`;

            const start = currentPage * pageSize;
            const end = start + pageSize;
            const pageDishes = currentFiltered.slice(start, end);

            const fragment = document.createDocumentFragment();
            pageDishes.forEach(d => {
                const card = document.createElement('div');
                card.className = 'dish-card';
                const costText = d.cost === 1 ? 'Дёшево' : d.cost === 2 ? 'Средне' : 'Дорого';
                const timeText = d.gotofnost === 1 ? 'Быстро' : d.gotofnost === 2 ? 'Средне' : 'Медленно';
                const sutText = d.sutnost === 1 ? 'Сытное' : 'Лёгкое';
                const bju = d.bju.replace('Б:', 'Белки:').replace('Ж:', 'Жиры:').replace('У:', 'Углеводы:');
                card.innerHTML = `
                    <h3>${d.name}</h3>
                    <p><span class="badge">🔥 ${d.calories} ккал</span></p>
                    <p>
                        <span class="badge">💰 ${costText}</span>
                        <span class="badge">⏱️ ${timeText}</span>
                        <span class="badge">🍲 ${sutText}</span>
                    </p>
                    <p><strong>Ингредиенты:</strong> ${d.ingredients}</p>
                    <p><strong>Рецепт:</strong> ${d.recipe}</p>
                    <p><small><strong>Пищевая ценность:</strong> ${bju}</small></p>
                `;
                fragment.appendChild(card);
            });
            resultDiv.appendChild(fragment);

            // Кнопка "Показать ещё" – только если есть ещё страницы
            if (end < currentFiltered.length) {
                const btn = document.createElement('button');
                btn.id = 'loadMoreBtn';
                btn.textContent = 'Показать ещё';
                btn.onclick = () => { currentPage++; showPage(); };
                resultDiv.appendChild(btn);
            }
        }

        // ========== СЛУЧАЙНОЕ БЛЮДО ==========
        function randomDish() {
            const pool = currentFiltered.length > 0 ? currentFiltered : dishes;
            if (pool.length === 0) { alert('Нет доступных блюд'); return; }
            const d = pool[Math.floor(Math.random() * pool.length)];
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'dish-card';
            const costText = d.cost === 1 ? 'Дёшево' : d.cost === 2 ? 'Средне' : 'Дорого';
            const timeText = d.gotofnost === 1 ? 'Быстро' : d.gotofnost === 2 ? 'Средне' : 'Медленно';
            const sutText = d.sutnost === 1 ? 'Сытное' : 'Лёгкое';
            const bju = d.bju.replace('Б:', 'Белки:').replace('Ж:', 'Жиры:').replace('У:', 'Углеводы:');
            card.innerHTML = `
                <h3>${d.name}</h3>
                <p><span class="badge">🔥 ${d.calories} ккал</span></p>
                <p>
                    <span class="badge">💰 ${costText}</span>
                    <span class="badge">⏱️ ${timeText}</span>
                    <span class="badge">🍲 ${sutText}</span>
                </p>
                <p><strong>Ингредиенты:</strong> ${d.ingredients}</p>
                <p><strong>Рецепт:</strong> ${d.recipe}</p>
                <p><small><strong>Пищевая ценность:</strong> ${bju}</small></p>
            `;
            resultDiv.appendChild(card);
        }
