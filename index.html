<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подбор блюд</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #5d4037; font-size: 2.2rem; }
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: linear-gradient(135deg, #333, #555); color: white;
            border: none; border-radius: 50%; width: 50px; height: 50px;
            font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; padding: 0;
            transition: all 0.3s;
        }
        .filter-panel {
            background: white; border-radius: 16px; padding: 20px;
            max-width: 900px; margin: 0 auto 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: background 0.3s;
        }
        .filter-group { margin-bottom: 15px; }
        .group-label { font-weight: 600; margin-bottom: 6px; color: #5d4037; display: block; font-size: 0.9rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        button {
            padding: 10px 18px; border: none; border-radius: 25px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: all 0.25s; background: #e0e0e0; color: #424242;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: nowrap;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        #kolBtn { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
        .cost-btn { background: linear-gradient(135deg, #4caf50, #388e3c); color: white; }
        .cost-btn.active { background: linear-gradient(135deg, #2e7d32, #1b5e20); box-shadow: 0 0 8px #2e7d32; }
        .time-btn { background: linear-gradient(135deg, #2196f3, #1976d2); color: white; }
        .time-btn.active { background: linear-gradient(135deg, #0d47a1, #0a3d8f); box-shadow: 0 0 8px #0d47a1; }
        .sut-btn { background: linear-gradient(135deg, #9c27b0, #7b1fa2); color: white; }
        .sut-btn.active { background: linear-gradient(135deg, #4a148c, #3a0f70); box-shadow: 0 0 8px #4a148c; }
        #pskBtn { background: linear-gradient(135deg, #e53935, #c62828); color: white; padding: 12px 30px; font-size: 1rem; }
        .reset-btn { background: #bdbdbd; color: #333; margin-left: 10px; }
        .kalori-badge {
            background: #ff9800; color: white; padding: 4px 12px;
            border-radius: 12px; font-size: 0.85rem; font-weight: 600;
            display: inline-block; margin-left: 8px;
        }
        .reset-single {
            cursor: pointer; color: #999; margin-left: 6px;
            font-size: 0.8rem; vertical-align: middle; transition: color 0.2s;
        }
        .reset-single:hover { color: #e53935; }
        #kaloriMinInput, #kaloriMaxInput {
            padding: 10px 14px; border-radius: 25px; border: 1px solid #ccc;
            width: 100px; font-size: 0.9rem; margin-right: 8px;
        }
        #result { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .results-counter {
            text-align: center; margin-bottom: 15px; font-weight: 600;
            color: #5d4037; background: white; padding: 10px; border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dish-card {
            background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border-left: 6px solid #ff9800;
            animation: fadeInUp 0.4s ease-out;
        }
        .dish-card h3 { margin-bottom: 8px; color: #5d4037; font-size: 1.4rem; }
        .badge {
            display: inline-block; background: #f0f0f0; border-radius: 12px;
            padding: 2px 10px; margin-right: 8px; font-size: 0.85rem; color: #555;
        }
        .no-results { text-align: center; padding: 30px; background: white; border-radius: 16px; color: #888; font-size: 1.1rem; }
        /* тёмная тема */
        body.dark { background: #1a1a2e; color: #e0e0e0; }
        body.dark h1 { color: #ffcc80; }
        body.dark .filter-panel { background: #16213e; }
        body.dark .group-label { color: #ffcc80; }
        body.dark .dish-card { background: #16213e; }
        body.dark .dish-card h3 { color: #ffcc80; }
        body.dark .badge { background: #0f3460; color: #ccc; }
        body.dark .no-results { background: #16213e; color: #aaa; }
        body.dark .results-counter { background: #16213e; color: #ffcc80; }
        body.dark #kaloriMinInput, body.dark #kaloriMaxInput {
            background: #2a2a3c; color: #eee; border-color: #555;
        }
        body.dark #kaloriMinInput::placeholder, body.dark #kaloriMaxInput::placeholder { color: #aaa; }
        #loadMoreBtn {
            display: block; margin: 20px auto; padding: 12px 30px;
            border-radius: 25px; background: linear-gradient(135deg, #4caf50, #388e3c);
            color: white; border: none; cursor: pointer; font-size: 1rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Тема">🌙</button>
    <h1>🍽️ Подбор блюд</h1>
    <div class="filter-panel">
        <div class="filter-group">
            <span class="group-label">🔥 Калорийность <span class="reset-single" onclick="resetKalori()">✕</span></span>
            <div class="btn-group">
                <input type="number" id="kaloriMinInput" placeholder="Мин. ккал">
                <input type="number" id="kaloriMaxInput" placeholder="Макс. ккал">
                <button id="kolBtn" onclick="applyKalori()">Применить</button>
                <span id="kaloriDisplay"></span>
            </div>
        </div>
        <div class="filter-group">
            <span class="group-label">💰 Цена <span class="reset-single" onclick="resetCost()">✕</span></span>
            <div class="btn-group">
                <button class="cost-btn" id="cheapBtn" onclick="costCheap()">Дёшево</button>
                <button class="cost-btn" id="mediumBtn" onclick="costMedium()">Средне</button>
                <button class="cost-btn" id="expensiveBtn" onclick="costExpensive()">Дорого</button>
            </div>
        </div>
        <div class="filter-group">
            <span class="group-label">⏱️ Время <span class="reset-single" onclick="resetTime()">✕</span></span>
            <div class="btn-group">
                <button class="time-btn" id="bstBtn" onclick="gotofnost1()">Быстрое</button>
                <button class="time-btn" id="medBtn" onclick="gotofnost2()">Среднее</button>
                <button class="time-btn" id="sloBtn" onclick="gotofnost3()">Медленное</button>
            </div>
        </div>
        <div class="filter-group">
            <span class="group-label">🍲 Сытность <span class="reset-single" onclick="resetSytnost()">✕</span></span>
            <div class="btn-group">
                <button class="sut-btn" id="sutBtn" onclick="sutnost1()">Сытное</button>
                <button class="sut-btn" id="legBtn" onclick="sutnost2()">Лёгкое</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="btn-group">
                <button id="pskBtn" onclick="poisk()">🔍 Найти блюдо</button>
                <button id="randomBtn" onclick="randomDish()">🎲 Случайное блюдо</button>
                <button class="reset-btn" onclick="resetFilters()">🔄 Сбросить всё</button>
            </div>
        </div>
    </div>
    <div id="result"></div>

    <script>
        // ========== ТЕМА (системные настройки + localStorage) ==========
        function applyTheme(mode) {
            if (mode === 'dark') {
                document.body.classList.add('dark');
                const btn = document.querySelector('.theme-toggle');
                if (btn) { btn.textContent = '☀️'; btn.title = 'Светлая тема'; }
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark');
                const btn = document.querySelector('.theme-toggle');
                if (btn) { btn.textContent = '🌙'; btn.title = 'Тёмная тема'; }
                localStorage.setItem('theme', 'light');
            }
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || saved === 'light') {
                applyTheme(saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            }
        })();
        function toggleTheme() {
            applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
        }

        // ========== ФИЛЬТРЫ ==========
        let minKal = 0, maxKal = 0, cost = 0, gotofnost = 0, sutnost = 0;
        let currentPage = 0, pageSize = 10, currentFiltered = [];

        function clearActiveGroup(sel) {
            document.querySelectorAll(sel).forEach(b => b.classList.remove('active'));
        }
        function updateKaloriDisplay() {
            const span = document.getElementById('kaloriDisplay');
            let text = '';
            if (minKal > 0 && maxKal > 0) text = `От ${minKal} до ${maxKal} ккал`;
            else if (maxKal > 0) text = `До ${maxKal} ккал`;
            else if (minKal > 0) text = `От ${minKal} ккал`;
            span.className = text ? 'kalori-badge' : '';
            span.textContent = text;
        }
        function applyKalori() {
            const minI = document.getElementById('kaloriMinInput');
            const maxI = document.getElementById('kaloriMaxInput');
            minKal = Number(minI.value) || 0;
            maxKal = Number(maxI.value) || 0;
            updateKaloriDisplay();
        }
        function resetKalori() {
            minKal = maxKal = 0;
            document.getElementById('kaloriMinInput').value = '';
            document.getElementById('kaloriMaxInput').value = '';
            updateKaloriDisplay();
        }

        function costCheap() { cost=1; clearActiveGroup('.cost-btn'); document.getElementById('cheapBtn').classList.add('active'); }
        function costMedium() { cost=2; clearActiveGroup('.cost-btn'); document.getElementById('mediumBtn').classList.add('active'); }
        function costExpensive() { cost=3; clearActiveGroup('.cost-btn'); document.getElementById('expensiveBtn').classList.add('active'); }
        function resetCost() { cost=0; clearActiveGroup('.cost-btn'); }

        function gotofnost1() { gotofnost=1; clearActiveGroup('.time-btn'); document.getElementById('bstBtn').classList.add('active'); }
        function gotofnost2() { gotofnost=2; clearActiveGroup('.time-btn'); document.getElementById('medBtn').classList.add('active'); }
        function gotofnost3() { gotofnost=3; clearActiveGroup('.time-btn'); document.getElementById('sloBtn').classList.add('active'); }
        function resetTime() { gotofnost=0; clearActiveGroup('.time-btn'); }

        function sutnost1() { sutnost=1; clearActiveGroup('.sut-btn'); document.getElementById('sutBtn').classList.add('active'); }
        function sutnost2() { sutnost=2; clearActiveGroup('.sut-btn'); document.getElementById('legBtn').classList.add('active'); }
        function resetSytnost() { sutnost=0; clearActiveGroup('.sut-btn'); }

        function resetFilters() {
            minKal = maxKal = cost = gotofnost = sutnost = 0;
            document.getElementById('kaloriMinInput').value = '';
            document.getElementById('kaloriMaxInput').value = '';
            updateKaloriDisplay();
            clearActiveGroup('.cost-btn'); clearActiveGroup('.time-btn'); clearActiveGroup('.sut-btn');
            document.getElementById('result').innerHTML = '';
        }

        // ========== ЗАГРУЗКА БЛЮД ==========
        let dishes = [{"name":"Овощной бульон","calories":50,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"морковь, лук, вода","recipe":"1. Морковь (1 шт.) и лук (1 шт.) очистить, крупно нарезать.\n2. Залить 500 мл воды, довести до кипения.\n3. Варить на слабом огне 20 минут.\n4. Процедить через мелкое сито или марлю.\n5. Бульон готов, можно использовать как основу.","bju":"Б:1,Ж:0,У:10"},
  {"name":"Салат из капусты с лимоном","calories":70,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"капуста — 150 г, лимонный сок, соль","recipe":"1. Белокочанную капусту (150 г) тонко нашинковать.\n2. Посолить по вкусу, слегка помять руками, чтобы стала мягче.\n3. Выжать сок ¼ лимона (около 1 ст. л.), заправить.\n4. Перемешать, дать настояться 5 минут перед подачей.","bju":"Б:2,Ж:0,У:14"},
  {"name":"Томатный сок","calories":90,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"томаты — 300 г, соль","recipe":"1. Спелые томаты (300 г) помыть, удалить плодоножки, нарезать дольками.\n2. Поместить в блендер, добавить щепотку соли, взбить до однородности.\n3. Процедить через сито, чтобы убрать семена и кожицу.\n4. Подавать охлаждённым.","bju":"Б:3,Ж:0,У:18"},
  {"name":"Огуречный салат без масла","calories":60,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"огурцы — 200 г, укроп, лимонный сок","recipe":"1. Свежие огурцы (200 г) вымыть, нарезать тонкими кружками или полукружками.\n2. Мелко порубить несколько веточек укропа.\n3. Сбрызнуть лимонным соком (1 ч. л.), посолить.\n4. Аккуратно перемешать, сразу подавать.","bju":"Б:2,Ж:0,У:10"},
  {"name":"Яблочное пюре","calories":80,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"яблоки — 200 г, вода","recipe":"1. Яблоки очистить от кожуры и сердцевины, нарезать кубиками.\n2. Поместить в сотейник, добавить 2–3 ст. л. воды.\n3. Тушить на слабом огне под крышкой 10–12 минут до мягкости.\n4. Размять толкушкой или взбить блендером до состояния пюре.","bju":"Б:0,Ж:0,У:20"},
  {"name":"Кефир обезжиренный","calories":95,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"кефир 0% — 200 мл","recipe":"1. Охлаждённый кефир (200 мл) перелить в стакан.\n2. При желании добавить мелко рубленую зелень или щепотку соли.\n3. Пить сразу, пока холодный.","bju":"Б:6,Ж:0,У:8"},
  {"name":"Гречневая каша на воде","calories":90,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"гречка — 40 г, вода","recipe":"1. Гречневую крупу (40 г) перебрать, промыть.\n2. Залить 100 мл воды, посолить.\n3. Довести до кипения, убавить огонь, варить под крышкой 15 минут до впитывания воды.\n4. Выключить, дать постоять 5 минут, разрыхлить вилкой.","bju":"Б:4,Ж:1,У:20"},
  {"name":"Тушёная морковь","calories":80,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"морковь — 200 г, вода, соль","recipe":"1. Морковь очистить, нарезать кружками или брусочками.\n2. Выложить в сотейник, добавить 50 мл воды, щепотку соли.\n3. Тушить на слабом огне под крышкой 15–20 минут до мягкости.\n4. При желании в конце слегка размять вилкой.","bju":"Б:2,Ж:0,У:18"},
  {"name":"Картофельный отвар","calories":100,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель — 150 г, вода, соль","recipe":"1. Картофель очистить, нарезать кубиками.\n2. Залить 400 мл воды, посолить, довести до кипения.\n3. Варить 15–20 минут до готовности картофеля.\n4. Жидкость слить и использовать как лёгкий суп; картофель можно съесть отдельно.","bju":"Б:2,Ж:0,У:22"},
  {"name":"Салат из свежих помидоров","calories":70,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"помидоры — 200 г, зелень, соль","recipe":"1. Спелые помидоры (200 г) нарезать дольками или кубиками.\n2. Мелко порубить зелень (укроп, петрушку, базилик).\n3. Посолить, посыпать зеленью, аккуратно перемешать.\n4. Подавать сразу после приготовления.","bju":"Б:2,Ж:0,У:14"},
  {"name":"Морковный фреш","calories":85,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"морковь — 200 г, вода","recipe":"1. Морковь (200 г) тщательно вымыть, очистить.\n2. Пропустить через соковыжималку.\n3. При желании разбавить 30–50 мл холодной воды, перемешать.\n4. Разлить по стаканам, пить свежевыжатым.","bju":"Б:2,Ж:0,У:20"},
  {"name":"Тыквенный сок","calories":95,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"тыква — 250 г","recipe":"1. Тыкву очистить от кожуры и семян, нарезать кусками.\n2. Пропустить через соковыжималку.\n3. При желании процедить через сито.\n4. Подавать охлаждённым или комнатной температуры.","bju":"Б:2,Ж:0,У:22"},
  {"name":"Овощной суп без масла","calories":75,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"капуста, морковь, лук, вода","recipe":"1. Капусту (100 г) нашинковать, морковь (1 шт.) натереть, лук (1 шт.) мелко порубить.\n2. Залить 600 мл воды, довести до кипения.\n3. Варить на слабом огне 25–30 минут.\n4. Посолить, при желании добавить лавровый лист за 5 минут до окончания.","bju":"Б:2,Ж:0,У:16"},
  {"name":"Тушёная капуста","calories":85,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"капуста — 200 г, вода, соль","recipe":"1. Белокочанную капусту тонко нашинковать.\n2. Выложить в глубокую сковороду или сотейник, добавить 80 мл воды, посолить.\n3. Тушить под крышкой на слабом огне 25–30 минут, периодически помешивая.\n4. При желании в конце добавить щепотку тмина или укропа.","bju":"Б:3,Ж:0,У:18"},
  {"name":"Гороховый суп-пюре","calories":100,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"горох — 50 г, вода, соль","recipe":"1. Колотый горох (50 г) промыть, замочить на 2–3 часа (по возможности).\n2. Залить 400 мл свежей воды, довести до кипения, снять пену.\n3. Варить на слабом огне 40–50 минут до полного разваривания.\n4. Посолить, взбить погружным блендером до однородного пюре.","bju":"Б:8,Ж:0,У:16"},
  {"name":"Свекольный сок","calories":80,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла — 200 г","recipe":"1. Сырую свёклу (200 г) тщательно вымыть, очистить, нарезать.\n2. Пропустить через соковыжималку.\n3. Дать постоять 10 минут, чтобы ушла пена.\n4. Пить небольшими глотками, можно слегка разбавить водой.","bju":"Б:3,Ж:0,У:18"},
  {"name":"Капустный салат с уксусом","calories":65,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"капуста — 150 г, яблочный уксус","recipe":"1. Капусту (150 г) тонко нашинковать.\n2. Слегка посолить, помять руками до выделения сока.\n3. Добавить 1 чайную ложку яблочного уксуса, тщательно перемешать.\n4. Дать настояться 10 минут перед подачей.","bju":"Б:2,Ж:0,У:12"},
  {"name":"Огуречный рассол","calories":55,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"огурцы солёные — 100 г, вода","recipe":"1. Солёные огурцы (100 г) нарезать кружками.\n2. Залить 200 мл холодной кипячёной воды.\n3. Дать настояться 15–20 минут в холодильнике.\n4. Пить рассол как освежающий напиток, огурцы можно съесть.","bju":"Б:1,Ж:0,У:10"},
  {"name":"Куриный бульон обезжиренный","calories":70,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"куриная грудка — 80 г, вода","recipe":"1. Куриную грудку (80 г) промыть, залить 500 мл холодной воды.\n2. Довести до кипения, снять пену.\n3. Варить на слабом огне 30 минут.\n4. Снять с поверхности весь жир, бульон процедить. Мясо можно использовать отдельно.","bju":"Б:12,Ж:1,У:1"},
  {"name":"Белковый омлет","calories":90,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яичные белки — 3 шт., соль","recipe":"1. Отделить белки от желтков (3 яйца), добавить щепотку соли.\n2. Взбить венчиком или миксером до лёгкой пены.\n3. Вылить на сухую антипригарную сковороду, разогретую на слабом огне.\n4. Готовить под крышкой 3–4 минуты до схватывания. Переложить на тарелку.","bju":"Б:18,Ж:0,У:2"},
  {"name":"Рыбное суфле","calories":100,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"филе трески — 80 г, белок","recipe":"1. Филе трески (80 г) нарезать, измельчить в блендере до однородности.\n2. Добавить яичный белок, щепотку соли, взбить до пышной консистенции.\n3. Переложить в силиконовую форму или пиалу.\n4. Готовить на пару 12–15 минут. Аккуратно вынуть, подавать тёплым.","bju":"Б:20,Ж:1,У:1"},
  {"name":"Салат из шпината","calories":65,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"шпинат — 100 г, лимонный сок","recipe":"1. Молодые листья шпината (100 г) тщательно промыть, обсушить.\n2. Выложить в миску, сбрызнуть 1 ст. ложкой лимонного сока.\n3. Слегка посолить, аккуратно перемешать руками.\n4. Сразу подавать, пока листья хрустящие.","bju":"Б:3,Ж:0,У:4"},
  {"name":"Кефир с отрубями","calories":80,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"кефир 1% — 200 мл, отруби — 10 г","recipe":"1. В стакан налить кефир (200 мл) комнатной температуры или слегка охлаждённый.\n2. Всыпать отруби (10 г), тщательно размешать.\n3. Дать постоять 3–5 минут, чтобы отруби набухли.\n4. Ещё раз перемешать и выпить.","bju":"Б:7,Ж:1,У:12"},
  {"name":"Фруктовый лёд","calories":95,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"замороженные ягоды — 100 г, вода","recipe":"1. Замороженные ягоды (100 г) слегка разморозить, переложить в блендер.\n2. Добавить 50 мл холодной воды, взбить до состояния пюре.\n3. Разлить по формочкам для льда, вставить палочки.\n4. Заморозить минимум 3 часа. Доставать за 1–2 минуты перед едой.","bju":"Б:1,Ж:0,У:22"},
  {"name":"Куриная грудка на пару","calories":100,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка — 80 г, соль","recipe":"1. Куриную грудку (80 г) слегка отбить, посолить с обеих сторон.\n2. Поместить в пароварку или на решётку над кипящей водой.\n3. Готовить на пару 18–20 минут.\n4. Перед подачей нарезать ломтиками поперёк волокон.","bju":"Б:22,Ж:2,У:0"},
  {"name":"Творог обезжиренный","calories":90,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"творог 0% — 100 г","recipe":"1. Обезжиренный творог (100 г) достать из холодильника.\n2. Размять вилкой, чтобы не было комков.\n3. Подавать охлаждённым, при желании добавить рубленую зелень.","bju":"Б:18,Ж:0,У:3"},
  {"name":"Рыбный бульон","calories":80,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"рыбные кости, вода, лук","recipe":"1. Рыбные кости и головы (около 200 г) промыть, залить 600 мл холодной воды.\n2. Добавить целую очищенную луковицу.\n3. Довести до кипения, снять пену, варить 25 минут на слабом огне.\n4. Процедить через марлю, кости и лук удалить. Бульон готов.","bju":"Б:10,Ж:1,У:1"},
  {"name":"Овощной салат с йогуртом","calories":75,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"огурцы, помидоры, йогурт 0%","recipe":"1. Огурец и помидор (по 100 г) нарезать кубиками.\n2. Добавить 2 ст. л. натурального йогурта 0%.\n3. Посолить, при желании добавить рубленый укроп.\n4. Перемешать и сразу подавать.","bju":"Б:3,Ж:0,У:14"},
  {"name":"Сельдерей с лимоном","calories":60,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"сельдерей — 150 г, лимонный сок","recipe":"1. Стебли сельдерея (150 г) вымыть, очистить от грубых волокон.\n2. Нарезать тонкими ломтиками или брусочками.\n3. Сбрызнуть 1 ч. л. лимонного сока, слегка посолить.\n4. Перемешать, дать постоять 5 минут.","bju":"Б:2,Ж:0,У:10"},
  {"name":"Морковные палочки","calories":85,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"морковь — 200 г","recipe":"1. Свежую морковь (200 г) очистить.\n2. Нарезать брусочками длиной около 5–6 см.\n3. Выложить на тарелку.\n4. Можно подавать просто так или с лимонным соком.","bju":"Б:2,Ж:0,У:20"},
  {"name":"Тушёная фасоль","calories":95,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"фасоль — 60 г, вода, соль","recipe":"1. Сухую фасоль (60 г) промыть, замочить в холодной воде на 6–8 часов (или на ночь).\n2. Слить воду, залить свежей (300 мл), довести до кипения.\n3. Варить на слабом огне 1–1,5 часа до мягкости, посолить за 10 минут до конца.\n4. Слить отвар или подавать фасоль с небольшим количеством жидкости.","bju":"Б:8,Ж:0,У:16"},
  {"name":"Чечевичный суп","calories":100,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"чечевица — 50 г, вода","recipe":"1. Красную или зелёную чечевицу (50 г) промыть.\n2. Залить 400 мл воды, довести до кипения.\n3. Варить на слабом огне 20–25 минут до размягчения.\n4. Посолить, при желании взбить погружным блендером до кремообразного состояния.","bju":"Б:10,Ж:0,У:14"},
  {"name":"Капустный суп","calories":85,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"капуста — 150 г, морковь, вода","recipe":"1. Капусту (150 г) нашинковать, морковь (1 шт.) натереть на тёрке.\n2. Залить 500 мл воды, довести до кипения.\n3. Варить 20–25 минут на умеренном огне.\n4. Посолить, добавить лавровый лист за 5 минут до готовности.","bju":"Б:3,Ж:0,У:18"},
  {"name":"Свекольник холодный","calories":70,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"свёкла — 150 г, кефир 0%","recipe":"1. Свёклу (150 г) отварить до готовности (около 1 часа), остудить, очистить.\n2. Натереть на крупной тёрке.\n3. Залить охлаждённым кефиром (150 мл), посолить.\n4. Добавить рубленую зелень, перемешать, подавать холодным.","bju":"Б:4,Ж:0,У:14"},
  {"name":"Овощной отвар","calories":55,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"морковь, лук, петрушка, вода","recipe":"1. Морковь (1 шт.) и луковицу очистить, крупно нарезать, добавить несколько веточек петрушки.\n2. Залить 500 мл воды, довести до кипения.\n3. Варить на слабом огне 20 минут.\n4. Процедить, овощи удалить. Отвар готов к употреблению.","bju":"Б:1,Ж:0,У:10"},
  {"name":"Тыквенное пюре","calories":80,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"тыква — 200 г, вода","recipe":"1. Тыкву (200 г) очистить, нарезать кубиками.\n2. Залить небольшим количеством воды (50 мл), тушить под крышкой 15 минут.\n3. Слить лишнюю жидкость, размять толкушкой или взбить блендером.\n4. При желании добавить щепотку корицы.","bju":"Б:2,Ж:0,У:18"},
  {"name":"Стейк из тунца на пару","calories":100,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"тунец — 80 г, соль","recipe":"1. Стейк тунца (80 г) посолить, оставить на 5 минут.\n2. Поместить в пароварку или на решётку над кипящей водой.\n3. Готовить на пару 8–10 минут (до лёгкого изменения цвета).\n4. Подавать сразу, при желании сбрызнуть лимонным соком.","bju":"Б:22,Ж:2,У:0"},
  {"name":"Устрицы","calories":90,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"устрицы — 6 шт.","recipe":"1. Свежих устриц (6 шт.) тщательно вымыть щёткой.\n2. С помощью устричного ножа аккуратно открыть раковины.\n3. Отделить моллюска от створки, сохранив сок.\n4. Подать сырыми на льду с долькой лимона.","bju":"Б:14,Ж:3,У:4"},
  {"name":"Креветки отварные","calories":95,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки — 100 г, соль","recipe":"1. Замороженные или свежие креветки (100 г) промыть.\n2. Вскипятить 500 мл воды, посолить.\n3. Опустить креветки, варить 2–3 минуты после всплытия.\n4. Откинуть на дуршлаг, обдать холодной водой, очистить.","bju":"Б:20,Ж:1,У:0"},
  {"name":"Сашими из лосося","calories":100,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"лосось — 60 г","recipe":"1. Охлаждённое филе лосося (60 г) проверить на отсутствие костей.\n2. Острым ножом нарезать поперёк волокон тонкими ломтиками (около 5 мм).\n3. Красиво выложить на тарелку.\n4. Подавать с соевым соусом и васаби по желанию.","bju":"Б:14,Ж:5,У:0"},
  {"name":"Морской гребешок","calories":80,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки — 80 г, лимон","recipe":"1. Гребешки (80 г) промыть, обсушить бумажным полотенцем.\n2. Разогреть сухую сковороду с антипригарным покрытием.\n3. Обжарить гребешки по 1–1,5 минуты с каждой стороны до золотистой корочки.\n4. Сбрызнуть соком лимона, сразу подать.","bju":"Б:18,Ж:1,У:2"},
  {"name":"Икра лососёвая","calories":95,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"икра — 30 г","recipe":"1. Баночку с икрой (30 г) достать из холодильника за 5 минут до подачи.\n2. Аккуратно переложить в стеклянную или фарфоровую пиалу.\n3. Подавать охлаждённой.\n4. Можно есть чайной ложкой или намазывать на подсушенный хлеб (если разрешено).","bju":"Б:8,Ж:5,У:3"},
  {"name":"Филе сибаса на пару","calories":100,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"филе сибаса — 80 г, соль","recipe":"1. Филе сибаса (80 г) посолить, оставить на 5 минут.\n2. Выложить на решётку пароварки.\n3. Готовить на пару 10–12 минут до побеления мяса.\n4. Аккуратно переложить на тарелку, при желании украсить зеленью.","bju":"Б:22,Ж:2,У:0"},
  {"name":"Кальмар отварной","calories":90,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"кальмар — 100 г","recipe":"1. Тушку кальмара (100 г) разморозить, снять кожицу, удалить внутренности.\n2. Вскипятить воду, подсолить.\n3. Опустить кальмара в кипяток ровно на 2 минуты (не дольше, иначе станет резиновым).\n4. Вынуть, обдать холодной водой, нарезать кольцами.","bju":"Б:18,Ж:1,У:1"},
  {"name":"Осьминог гриль","calories":95,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"осьминог — 80 г, лимон","recipe":"1. Маленького осьминога (80 г) очистить, промыть.\n2. Разогреть сковороду-гриль без масла.\n3. Обжарить осьминога по 2–3 минуты с каждой стороны.\n4. Сбрызнуть лимонным соком, нарезать, подавать.","bju":"Б:20,Ж:1,У:2"},
  {"name":"Салат из рукколы с лимоном","calories":65,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"руккола — 80 г, лимонный сок","recipe":"1. Рукколу (80 г) промыть, обсушить в сушилке для зелени.\n2. Выложить в миску, сбрызнуть 1 ч. л. лимонного сока.\n3. Слегка посолить, аккуратно перемешать.\n4. Подавать сразу.","bju":"Б:3,Ж:0,У:4"},
  {"name":"Овощной сок","calories":80,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"сельдерей, огурец, шпинат","recipe":"1. 2 стебля сельдерея, 1 огурец и горсть шпината (30 г) вымыть.\n2. Нарезать кусками, пропустить через соковыжималку.\n3. Перемешать, при желании процедить.\n4. Пить свежевыжатым, можно добавить кубик льда.","bju":"Б:3,Ж:0,У:16"},
  {"name":"Авокадо (половинка)","calories":100,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"авокадо — 60 г","recipe":"1. Спелое авокадо разрезать пополам, удалить косточку.\n2. Половинку (около 60 г) очистить от кожуры или есть ложкой прямо из кожуры.\n3. Нарезать дольками или размять.\n4. Сбрызнуть лимонным соком, чтобы не потемнело.","bju":"Б:1,Ж:9,У:2"},
  {"name":"Лосось на пару","calories":100,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"лосось — 80 г, соль","recipe":"1. Филе лосося (80 г) посолить, при желании добавить щепотку сухого укропа.\n2. Поместить в пароварку.\n3. Готовить на пару 10–12 минут.\n4. Подавать с долькой лимона.","bju":"Б:20,Ж:4,У:0"},
  {"name":"Тунец консервированный в с/с","calories":90,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"тунец — 80 г, вода","recipe":"1. Открыть банку тунца в собственном соку.\n2. Слить жидкость.\n3. Мясо размять вилкой.\n4. Использовать для салатов или есть просто так.","bju":"Б:20,Ж:1,У:0"},
  {"name":"Камбала отварная","calories":85,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"камбала — 100 г","recipe":"1. Камбалу (100 г) очистить, промыть.\n2. Опустить в кипящую подсоленную воду.\n3. Варить 7–10 минут до готовности (мясо должно легко отделяться от костей).\n4. Вынуть шумовкой, подавать тёплой.","bju":"Б:18,Ж:2,У:0"},
  {"name":"Морская капуста","calories":55,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"морская капуста — 100 г","recipe":"1. Готовую морскую капусту (100 г) откинуть на сито, чтобы стекла лишняя жидкость.\n2. Выложить в салатник.\n3. При желании сбрызнуть лимонным соком или соевым соусом.\n4. Подавать как самостоятельный салат.","bju":"Б:2,Ж:0,У:10"},
  {"name":"Огуречный смузи","calories":70,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"огурец, сельдерей, лимон","recipe":"1. Огурец (1 шт.) и стебель сельдерея вымыть, нарезать.\n2. Поместить в блендер, добавить сок ¼ лимона и 100 мл воды.\n3. Взбить до однородной консистенции.\n4. При желании процедить, подавать охлаждённым.","bju":"Б:2,Ж:0,У:12"},
  {"name":"Кокосовая вода","calories":90,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"кокосовая вода — 200 мл","recipe":"1. Охлаждённую кокосовую воду (200 мл) перелить в стакан.\n2. Можно добавить кубик льда.\n3. Пить как освежающий напиток.\n4. Хранить открытую не более суток.","bju":"Б:1,Ж:0,У:18"},
  {"name":"Яичный белок с помидором","calories":110,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"белки 3 шт., помидор 1 шт., соль","recipe":"1. Белки трёх яиц взбить с щепоткой соли.\n2. Помидор нарезать кружками.\n3. Вылить белки на разогретую сухую сковороду, сверху разложить помидор.\n4. Готовить под крышкой 4–5 минут, пока белок не схватится.","bju":"Б:12,Ж:0,У:6"},
  {"name":"Гренки из цельнозернового хлеба","calories":160,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"хлеб цельнозерновой 2 ломтика, чеснок","recipe":"1. Цельнозерновой хлеб нарезать ломтиками толщиной 1 см.\n2. Разогреть сухую сковороду, выложить хлеб.\n3. Подсушить с обеих сторон до румяности.\n4. Натереть горячие гренки разрезанным зубчиком чеснока.","bju":"Б:6,Ж:2,У:30"},
  {"name":"Творог 5% с зеленью","calories":145,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"творог 5% 100 г, укроп, соль","recipe":"1. Творог (100 г) размять вилкой.\n2. Мелко нарезать несколько веточек укропа.\n3. Смешать творог с укропом, посолить по вкусу.\n4. Подавать как самостоятельную закуску или на хлеб.","bju":"Б:18,Ж:5,У:3"},
  {"name":"Салат из пекинской капусты","calories":120,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"пекинская капуста 150 г, огурец, лимонный сок","recipe":"1. Пекинскую капусту (150 г) нашинковать.\n2. Огурец нарезать полукружками.\n3. Заправить 1 ст. л. лимонного сока, посолить.\n4. Перемешать, дать постоять 5 минут.","bju":"Б:3,Ж:0,У:15"},
  {"name":"Кефирный мусс","calories":135,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"кефир 1% 200 мл, желатин 5 г","recipe":"1. Желатин (5 г) замочить в 30 мл холодной воды, оставить на 10 минут.\n2. Набухший желатин распустить на водяной бане, не доводя до кипения.\n3. Влить тонкой струйкой в кефир (200 мл), постоянно помешивая.\n4. Разлить по креманкам, охладить в холодильнике 2–3 часа до застывания.","bju":"Б:8,Ж:1,У:12"},
  {"name":"Морковные палочки с хумусом","calories":180,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"морковь 100 г, нут 50 г, лимон, кунжут","recipe":"1. Нут (50 г) предварительно замочить на 8 часов, затем отварить до мягкости (около 1 часа).\n2. Слить воду, взбить нут блендером с соком ½ лимона, 1 ст. л. кунжута и 30 мл воды до кремообразного состояния.\n3. Морковь нарезать палочками.\n4. Подавать палочки, обмакивая в хумус.","bju":"Б:8,Ж:4,У:25"},
  {"name":"Овсяная каша на воде","calories":130,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"овсяные хлопья 40 г, вода, соль","recipe":"1. Овсяные хлопья (40 г) залить 150 мл воды, посолить.\n2. Довести до кипения, уменьшить огонь.\n3. Варить, помешивая, 5–7 минут до загустения.\n4. Накрыть крышкой, дать постоять 2 минуты перед подачей.","bju":"Б:4,Ж:2,У:24"},
  {"name":"Картофельное пюре на воде","calories":150,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 200 г, вода, соль","recipe":"1. Картофель (200 г) очистить, нарезать кубиками.\n2. Отварить в подсоленной воде до мягкости (около 20 минут).\n3. Слить воду, оставив немного отвара.\n4. Размять толкушкой, добавляя отвар до желаемой консистенции.","bju":"Б:3,Ж:0,У:35"},
  {"name":"Рисовая каша с тыквой","calories":170,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"рис 50 г, тыква 100 г, вода","recipe":"1. Рис (50 г) промыть. Тыкву (100 г) очистить, нарезать мелкими кубиками.\n2. Смешать в кастрюле, залить 200 мл воды.\n3. Довести до кипения, варить на слабом огне 20 минут, периодически помешивая.\n4. При необходимости добавить ещё немного воды, довести до готовности.","bju":"Б:3,Ж:1,У:38"},
  {"name":"Суп-пюре из кабачков","calories":110,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"кабачки 200 г, лук, вода","recipe":"1. Кабачки (200 г) и луковицу очистить, нарезать кубиками.\n2. Залить 300 мл воды, посолить, довести до кипения.\n3. Варить 15 минут до мягкости.\n4. Взбить погружным блендером до однородности.","bju":"Б:3,Ж:0,У:18"},
  {"name":"Салат из свёклы с чесноком","calories":140,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"свёкла отварная 150 г, чеснок, лимон","recipe":"1. Отварную свёклу (150 г) очистить, натереть на крупной тёрке.\n2. Зубчик чеснока пропустить через пресс.\n3. Смешать свёклу с чесноком, сбрызнуть соком ½ лимона.\n4. Посолить, дать настояться 10 минут.","bju":"Б:3,Ж:0,У:30"},
  {"name":"Тушёная стручковая фасоль","calories":165,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"стручковая фасоль 150 г, помидоры 100 г, вода","recipe":"1. Стручковую фасоль (150 г) вымыть, нарезать кусочками по 3 см.\n2. Помидоры (100 г) нарезать дольками.\n3. Выложить в сотейник, добавить 50 мл воды, посолить.\n4. Тушить под крышкой 15–20 минут до мягкости фасоли.","bju":"Б:5,Ж:1,У:25"},
  {"name":"Гороховый суп","calories":120,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"горох колотый 60 г, картофель 100 г, вода","recipe":"1. Горох (60 г) промыть, замочить на 3–4 часа.\n2. Картофель (100 г) очистить, нарезать кубиками.\n3. Слить воду с гороха, залить 500 мл свежей воды, добавить картофель.\n4. Варить 40–50 минут до разваривания гороха, посолить.","bju":"Б:10,Ж:1,У:25"},
  {"name":"Тушёная чечевица","calories":155,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"чечевица 80 г, лук, морковь, вода","recipe":"1. Чечевицу (80 г) промыть. Лук и морковь (по 1 шт.) мелко нарезать.\n2. Овощи слегка припустить в сотейнике с 2 ст. л. воды 5 минут.\n3. Добавить чечевицу, залить 250 мл воды.\n4. Тушить под крышкой 25–30 минут до готовности, посолить.","bju":"Б:14,Ж:1,У:28"},
  {"name":"Перловая каша с грибами","calories":180,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"перловка 60 г, шампиньоны 100 г, вода","recipe":"1. Перловую крупу (60 г) промыть, замочить на 2–3 часа.\n2. Отварить в 200 мл воды до мягкости (около 40 минут).\n3. Шампиньоны (100 г) нарезать, потушить в небольшом количестве воды 10 минут.\n4. Смешать перловку с грибами, посолить, прогреть 5 минут.","bju":"Б:7,Ж:2,У:35"},
  {"name":"Постный борщ","calories":105,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла 150 г, капуста 100 г, вода","recipe":"1. Свёклу (150 г) очистить, натереть на тёрке, капусту (100 г) нашинковать.\n2. Залить 500 мл воды, довести до кипения.\n3. Варить 25 минут на слабом огне.\n4. Посолить, добавить лавровый лист, дать настояться 10 минут.","bju":"Б:3,Ж:0,У:24"},
  {"name":"Овощной бульон с зеленью","calories":135,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"морковь, лук, петрушка, вода","recipe":"1. Морковь, луковицу и пучок петрушки крупно нарезать.\n2. Залить 600 мл воды, варить 25 минут.\n3. За 5 минут до окончания добавить рубленую зелень.\n4. Процедить, овощи удалить. Бульон подавать горячим.","bju":"Б:1,Ж:0,У:15"},
  {"name":"Тыква запечённая","calories":160,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"тыква 200 г, корица","recipe":"1. Тыкву (200 г) очистить, нарезать ломтиками толщиной 1 см.\n2. Выложить на противень, застеленный пергаментом.\n3. Посыпать корицей, запекать при 180°C 20–25 минут.\n4. Подавать тёплой или холодной.","bju":"Б:2,Ж:0,У:38"},
  {"name":"Омлет из белков с ветчиной","calories":130,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"белки 3 шт., ветчина нежирная 30 г","recipe":"1. Белки взбить с щепоткой соли.\n2. Ветчину (30 г) нарезать мелкими кубиками.\n3. Вылить белки на сухую сковороду, посыпать ветчиной.\n4. Жарить под крышкой 4 минуты до готовности.","bju":"Б:16,Ж:3,У:2"},
  {"name":"Творожная запеканка без муки","calories":165,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"творог 5% 150 г, яйцо 1 шт., сахар","recipe":"1. Творог размять, смешать с яйцом и 1 ч. л. сахара.\n2. Выложить в небольшую форму.\n3. Запекать при 180°C 20 минут до румяной корочки.\n4. Остудить 5 минут, подавать.","bju":"Б:20,Ж:6,У:8"},
  {"name":"Куриные фрикадельки на пару","calories":190,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"фарш куриный 100 г, лук, белок","recipe":"1. Лук мелко порубить, смешать с куриным фаршем и яичным белком.\n2. Посолить, сформировать небольшие шарики.\n3. Выложить в пароварку.\n4. Готовить на пару 15 минут.","bju":"Б:22,Ж:5,У:6"},
  {"name":"Салат с тунцом и огурцом","calories":140,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"тунец в с/с 80 г, огурец, салат","recipe":"1. Тунец размять вилкой.\n2. Огурец нарезать кубиками.\n3. Листья салата порвать руками.\n4. Смешать все ингредиенты, слегка посолить.","bju":"Б:20,Ж:2,У:4"},
  {"name":"Смузи из сельдерея и яблока","calories":115,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"сельдерей 2 стебля, яблоко 1 шт.","recipe":"1. Стебли сельдерея и яблоко вымыть, нарезать.\n2. Поместить в блендер, добавить 100 мл воды.\n3. Взбить до однородности.\n4. При желании процедить, пить свежим.","bju":"Б:1,Ж:0,У:28"},
  {"name":"Яйцо пашот без масла","calories":155,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"яйцо 1 шт., уксус","recipe":"1. Вскипятить 500 мл воды, добавить 1 ст. л. уксуса.\n2. Яйцо аккуратно разбить в пиалу.\n3. Создать воронку в воде, вылить яйцо в центр.\n4. Варить 3 минуты, вынуть шумовкой.","bju":"Б:12,Ж:10,У:1"},
  {"name":"Куриная грудка на пару с брокколи","calories":120,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка 100 г, брокколи 100 г","recipe":"1. Куриную грудку посолить, нарезать крупными кусками.\n2. Брокколи разобрать на соцветия.\n3. Выложить в пароварку, готовить 15 минут.\n4. Подавать вместе, при желании сбрызнуть лимонным соком.","bju":"Б:26,Ж:2,У:6"},
  {"name":"Рыбные котлеты из трески","calories":150,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"филе трески 100 г, лук, яйцо","recipe":"1. Филе трески и лук пропустить через мясорубку или измельчить блендером.\n2. Добавить яйцо, посолить, тщательно перемешать.\n3. Сформировать котлеты.\n4. Обжарить на сухой антипригарной сковороде по 4 минуты с каждой стороны.","bju":"Б:22,Ж:3,У:8"},
  {"name":"Гречка с грибами","calories":180,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"гречка 60 г, шампиньоны 100 г, лук","recipe":"1. Гречку отварить в 150 мл воды 15 минут.\n2. Шампиньоны нарезать, лук порубить.\n3. Потушить грибы с луком в 3 ст. л. воды 10 минут.\n4. Смешать с гречкой, посолить, прогреть 2 минуты.","bju":"Б:9,Ж:2,У:34"},
  {"name":"Суп-пюре из цветной капусты","calories":100,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"цветная капуста 200 г, вода, соль","recipe":"1. Цветную капусту разобрать на соцветия.\n2. Залить 300 мл воды, посолить, варить 15 минут.\n3. Слить часть отвара, взбить блендером.\n4. При необходимости разбавить отваром до желаемой густоты.","bju":"Б:4,Ж:0,У:16"},
  {"name":"Салат из рукколы с креветками","calories":135,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"руккола 50 г, креветки 80 г, лимон","recipe":"1. Креветки отварить 2 минуты, очистить.\n2. Рукколу промыть, обсушить.\n3. Смешать, заправить соком ½ лимона.\n4. Посолить, сразу подавать.","bju":"Б:18,Ж:2,У:4"},
  {"name":"Запечённые помидоры с сыром","calories":170,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"помидоры 2 шт., моцарелла 50 г","recipe":"1. Помидоры разрезать пополам, удалить часть мякоти.\n2. Моцареллу нарезать кубиками, вложить в половинки.\n3. Запекать при 200°C 10–12 минут.\n4. Подавать тёплыми, посыпав базиликом.","bju":"Б:8,Ж:8,У:10"},
  {"name":"Фасолевый суп","calories":110,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"фасоль 60 г, картофель 100 г, вода","recipe":"1. Фасоль замочить на 8 часов, промыть.\n2. Залить 500 мл воды, варить 40 минут.\n3. Добавить нарезанный картофель, варить ещё 20 минут.\n4. Посолить, при желании добавить зелень.","bju":"Б:10,Ж:1,У:20"},
  {"name":"Тушёная говядина с овощами","calories":160,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"говядина 80 г, морковь, лук, вода","recipe":"1. Говядину нарезать кусочками, залить 100 мл воды.\n2. Тушить под крышкой 1 час.\n3. Добавить нарезанные морковь и лук, ещё 50 мл воды.\n4. Тушить ещё 30 минут до мягкости мяса.","bju":"Б:18,Ж:4,У:8"},
  {"name":"Куриные сердечки в томате","calories":185,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"куриные сердечки 100 г, томатная паста, вода","recipe":"1. Сердечки промыть, разрезать пополам.\n2. Томатную пасту (1 ст. л.) развести в 100 мл воды.\n3. Залить сердечки, тушить на слабом огне 35–40 минут.\n4. Посолить, поперчить, подавать.","bju":"Б:20,Ж:6,У:6"},
  {"name":"Овощное рагу","calories":105,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"кабачки, баклажаны, помидоры — всего 300 г","recipe":"1. Все овощи нарезать кубиками.\n2. Выложить в сотейник, добавить 50 мл воды.\n3. Тушить под крышкой 20 минут, периодически помешивая.\n4. Посолить, приправить зеленью.","bju":"Б:3,Ж:0,У:22"},
  {"name":"Грибной суп","calories":140,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"шампиньоны 200 г, картофель 100 г, вода","recipe":"1. Шампиньоны нарезать, картофель — кубиками.\n2. Залить 500 мл воды, довести до кипения.\n3. Варить 20 минут.\n4. Посолить, добавить зелень, дать настояться 5 минут.","bju":"Б:5,Ж:1,У:24"},
  {"name":"Капустные котлеты","calories":175,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"капуста 200 г, манка 20 г, яйцо","recipe":"1. Капусту мелко нашинковать, потушить в 50 мл воды 10 минут.\n2. Остудить, добавить манку, яйцо, посолить, перемешать.\n3. Сформировать котлеты.\n4. Запечь в духовке при 180°C 20 минут или обжарить на сухой сковороде.","bju":"Б:6,Ж:4,У:28"},
  {"name":"Тартар из лосося с лимоном","calories":120,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"лосось 80 г, лимон, каперсы","recipe":"1. Охлаждённое филе лосося нарезать мелкими кубиками.\n2. Добавить 1 ч. л. каперсов, сок ¼ лимона.\n3. Аккуратно перемешать.\n4. Подавать немедленно.","bju":"Б:16,Ж:5,У:2"},
  {"name":"Устрицы с лимонным соком","calories":150,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"устрицы 8 шт., лимон","recipe":"1. Устриц открыть, сохранив сок в раковине.\n2. Выжать несколько капель лимонного сока на каждую.\n3. Подать на льду.\n4. Есть сразу.","bju":"Б:18,Ж:4,У:8"},
  {"name":"Креветки с чесноком","calories":180,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки 120 г, чеснок, масло оливковое 1 ч.л.","recipe":"1. Креветки очистить, чеснок измельчить.\n2. Разогреть масло на сковороде, обжарить чеснок 30 секунд.\n3. Добавить креветки, жарить 2–3 минуты.\n4. Сразу подавать.","bju":"Б:24,Ж:3,У:2"},
  {"name":"Сашими из тунца","calories":130,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"тунец 80 г, соевый соус","recipe":"1. Филе тунца нарезать поперёк волокон тонкими слайсами.\n2. Выложить на тарелку.\n3. Подавать с соевым соусом.\n4. По желанию добавить васаби.","bju":"Б:22,Ж:2,У:0"},
  {"name":"Морской гребешок с манго","calories":160,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки 80 г, манго 50 г","recipe":"1. Гребешки обжарить на сухой сковороде по 1,5 минуты с каждой стороны.\n2. Манго очистить, нарезать кубиками.\n3. Выложить гребешки на тарелку, рядом манго.\n4. Подавать тёплыми.","bju":"Б:14,Ж:2,У:20"},
  {"name":"Икра морского ежа","calories":190,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"икра морского ежа 50 г, тост","recipe":"1. Тонкий ломтик хлеба подсушить до хруста.\n2. Выложить на тост икру морского ежа.\n3. Сразу подавать.\n4. Можно сбрызнуть лимонным соком.","bju":"Б:10,Ж:10,У:10"},
  {"name":"Филе дорадо на пару","calories":110,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"филе дорадо 100 г, лимон","recipe":"1. Филе посолить, сбрызнуть лимонным соком.\n2. Готовить в пароварке 10–12 минут.\n3. Аккуратно переложить на тарелку.\n4. Подавать с долькой лимона.","bju":"Б:22,Ж:3,У:0"},
  {"name":"Лобстер отварной","calories":140,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"хвост лобстера 100 г","recipe":"1. В большой кастрюле вскипятить подсоленную воду.\n2. Опустить хвост лобстера, варить 5–6 минут.\n3. Вынуть, остудить 2 минуты.\n4. Извлечь мясо, нарезать, подавать с лимоном.","bju":"Б:26,Ж:2,У:1"},
  {"name":"Стейк из тунца гриль","calories":170,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"стейк тунца 100 г, соль, перец","recipe":"1. Стейк посолить, поперчить.\n2. Разогреть сковороду-гриль без масла.\n3. Обжарить по 2 минуты с каждой стороны (до степени rare-medium).\n4. Дать отдохнуть 1 минуту, нарезать.","bju":"Б:28,Ж:4,У:0"},
  {"name":"Салат из авокадо с креветками","calories":125,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"авокадо ½ шт., креветки 60 г, лайм","recipe":"1. Креветки отварить, очистить.\n2. Авокадо нарезать кубиками.\n3. Смешать, заправить соком ½ лайма.\n4. Посолить, аккуратно перемешать.","bju":"Б:12,Ж:9,У:4"},
  {"name":"Руккола с пармезаном","calories":155,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"руккола 50 г, пармезан 30 г, бальзамик","recipe":"1. Рукколу вымыть, обсушить.\n2. Выложить на тарелку.\n3. Пармезан настрогать овощечисткой.\n4. Сбрызнуть бальзамическим уксусом.","bju":"Б:10,Ж:10,У:5"},
  {"name":"Гребешки с цветной капустой","calories":185,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"гребешки 80 г, цветная капуста 100 г","recipe":"1. Цветную капусту отварить 10 минут, взбить в пюре с небольшим количеством отвара.\n2. Гребешки обжарить на сухой сковороде по 1,5 минуты с каждой стороны.\n3. На тарелку выложить пюре, сверху гребешки.\n4. Подавать сразу.","bju":"Б:18,Ж:3,У:14"},
  {"name":"Фуа-гра на пару","calories":120,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"фуа-гра 50 г","recipe":"1. Кусочек фуа-гра посолить.\n2. Поместить в пароварку на 8–10 минут.\n3. Готовое фуа-гра станет мягким.\n4. Подавать на подсушенном хлебе.","bju":"Б:8,Ж:10,У:2"},
  {"name":"Тушёный кролик","calories":150,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"кролик 100 г, лук, морковь, вода","recipe":"1. Крольчатину нарубить кусочками.\n2. Лук и морковь нарезать.\n3. Сложить в кастрюлю, залить 150 мл воды.\n4. Тушить 1,5 часа до мягкости, посолить.","bju":"Б:22,Ж:4,У:4"},
  {"name":"Бараньи рёбрышки в духовке","calories":180,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"рёбрышки 120 г, розмарин","recipe":"1. Рёбрышки натереть солью, розмарином.\n2. Выложить на решётку, подставить противень.\n3. Запекать при 160°C 1,5 часа.\n4. Подавать горячими.","bju":"Б:20,Ж:12,У:0"},
  {"name":"Овощной бульон с трюфелем","calories":105,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"овощи, трюфельное масло 1 ч.л.","recipe":"1. Сварить овощной бульон из моркови, лука, сельдерея (процедить).\n2. В горячий бульон добавить 1 ч. л. трюфельного масла.\n3. Перемешать.\n4. Подавать в чашке.","bju":"Б:1,Ж:3,У:12"},
  {"name":"Запечённые артишоки","calories":140,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"артишоки 3 шт., лимон","recipe":"1. Артишоки очистить, срезать верхушки, удалить жёсткие листья.\n2. Отварить в подсоленной воде с соком лимона 20 минут.\n3. Разрезать пополам, выложить на противень.\n4. Запечь при 200°C 10 минут.","bju":"Б:4,Ж:0,У:30"},
  {"name":"Фенхель тушёный","calories":175,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"фенхель 200 г, вода, соль","recipe":"1. Фенхель нарезать дольками.\n2. Выложить в сотейник, добавить 50 мл воды.\n3. Тушить под крышкой 20 минут до мягкости.\n4. Посолить, подавать как гарнир.","bju":"Б:2,Ж:0,У:24"},
  {"name":"Овсяноблин с творогом","calories":280,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"овсяные хлопья 40 г, яйцо 1 шт., творог 5% 50 г, соль","recipe":"1. Овсяные хлопья смолоть в муку.\n2. Смешать с яйцом, посолить, дать постоять 5 минут.\n3. Выпечь тонкий блин на сухой сковороде с двух сторон.\n4. На половину блина выложить творог, свернуть.","bju":"Б:20,Ж:10,У:30"},
  {"name":"Яичница с овощами","calories":240,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"яйца 2 шт., помидор 1 шт., перец ½ шт., масло 1 ч.л.","recipe":"1. Помидор и перец нарезать кубиками.\n2. Обжарить на масле 3 минуты.\n3. Яйца взбить, залить овощи.\n4. Жарить, помешивая, 3–4 минуты до готовности.","bju":"Б:14,Ж:14,У:8"},
  {"name":"Гречневая каша с молоком","calories":270,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"гречка 60 г, молоко 150 мл, сахар 1 ч.л.","recipe":"1. Гречку промыть, залить молоком, добавить сахар.\n2. Довести до кипения, уменьшить огонь.\n3. Варить под крышкой 15–18 минут.\n4. Выключить, дать настояться 5 минут.","bju":"Б:10,Ж:4,У:48"},
  {"name":"Смузи из клубники и банана","calories":210,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"клубника 100 г, банан ½ шт., йогурт 100 мл","recipe":"1. Клубнику вымыть, удалить хвостики. Банан нарезать.\n2. Всё поместить в блендер, добавить йогурт.\n3. Взбить до однородности.\n4. Перелить в стакан, подавать.","bju":"Б:4,Ж:2,У:44"},
  {"name":"Творожный мусс с ягодами","calories":230,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"творог 5% 100 г, ягоды 50 г, мёд 1 ч.л.","recipe":"1. Творог взбить блендером с мёдом до кремообразного состояния.\n2. Ягоды вымыть, обсушить.\n3. В креманку выложить мусс, сверху ягоды.\n4. Охладить 10 минут перед подачей.","bju":"Б:18,Ж:5,У:25"},
  {"name":"Салат с киноа и овощами","calories":260,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"киноа 50 г, огурец, помидор, лимонный сок","recipe":"1. Киноа промыть, отварить в 100 мл воды 15 минут.\n2. Огурец и помидор нарезать кубиками.\n3. Смешать тёплую киноа с овощами.\n4. Заправить лимонным соком, посолить.","bju":"Б:8,Ж:4,У:45"},
  {"name":"Рисовая каша с изюмом","calories":250,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"рис 60 г, молоко 150 мл, изюм 20 г","recipe":"1. Рис промыть, залить молоком, добавить изюм.\n2. Варить на слабом огне 20 минут, помешивая.\n3. При необходимости добавить немного воды.\n4. Подавать тёплой.","bju":"Б:6,Ж:3,У:50"},
  {"name":"Картофельные котлеты","calories":290,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 200 г, мука 30 г, яйцо 1 шт., масло 1 ч.л.","recipe":"1. Картофель отварить, размять, остудить.\n2. Добавить муку, яйцо, посолить, замесить тесто.\n3. Сформировать котлеты.\n4. Обжарить на масле с двух сторон до румяной корочки.","bju":"Б:8,Ж:6,У:50"},
  {"name":"Чечевичная похлёбка","calories":220,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"чечевица 80 г, картофель 100 г, морковь, лук","recipe":"1. Чечевицу промыть. Овощи нарезать.\n2. Всё залить 500 мл воды, довести до кипения.\n3. Варить 25 минут до готовности.\n4. Посолить, при желании взбить часть супа для густоты.","bju":"Б:16,Ж:1,У:40"},
  {"name":"Овощной суп с фасолью","calories":190,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"фасоль консерв. 100 г, кабачки, помидоры, вода","recipe":"1. Кабачки и помидоры нарезать.\n2. Залить 400 мл воды, варить 10 минут.\n3. Добавить консервированную фасоль вместе с жидкостью.\n4. Прогреть 5 минут, посолить.","bju":"Б:8,Ж:1,У:35"},
  {"name":"Салат из морской капусты","calories":210,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"морская капуста 150 г, лук, масло 1 ч.л.","recipe":"1. Морскую капусту промыть, откинуть на дуршлаг.\n2. Лук нарезать тонкими полукольцами.\n3. Смешать с капустой, заправить маслом.\n4. Дать настояться 10 минут.","bju":"Б:3,Ж:4,У:22"},
  {"name":"Запечённые яблоки без сахара","calories":280,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"яблоки 3 шт., корица","recipe":"1. Яблоки вымыть, удалить сердцевину, не прорезая насквозь.\n2. В углубление насыпать немного корицы.\n3. Запекать при 180°C 20 минут.\n4. Подавать тёплыми.","bju":"Б:1,Ж:0,У:65"},
  {"name":"Гороховое пюре","calories":230,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"горох 100 г, вода, соль","recipe":"1. Горох замочить на 4 часа.\n2. Варить в 400 мл воды 1 час до разваривания.\n3. Слить лишнюю жидкость, размять толкушкой.\n4. Посолить, можно добавить щепотку сухого чеснока.","bju":"Б:16,Ж:1,У:42"},
  {"name":"Тушёная капуста с грибами","calories":260,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"капуста 200 г, шампиньоны 100 г, лук, масло 1 ч.л.","recipe":"1. Капусту нашинковать, грибы нарезать, лук порубить.\n2. В сотейнике разогреть масло, обжарить лук и грибы 5 минут.\n3. Добавить капусту, 50 мл воды, тушить 35–40 минут.\n4. Посолить, поперчить.","bju":"Б:6,Ж:4,У:40"},
  {"name":"Перловка с овощами","calories":290,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"перловка 80 г, морковь, лук, масло 1 ч.л.","recipe":"1. Перловку замочить на 2 часа, отварить до готовности (около 40 минут).\n2. Морковь натереть, лук нарезать, обжарить на масле 5 минут.\n3. Смешать с перловкой.\n4. Прогреть всё вместе 5 минут.","bju":"Б:8,Ж:4,У:55"},
  {"name":"Свекольная икра","calories":180,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла 200 г, лук, масло 1 ч.л., уксус","recipe":"1. Свёклу отварить или запечь до готовности, натереть на тёрке.\n2. Лук мелко нарезать, обжарить на масле до золотистости.\n3. Смешать со свёклой, добавить 1 ч. л. уксуса.\n4. Посолить, охладить.","bju":"Б:3,Ж:4,У:28"},
  {"name":"Тыквенный суп","calories":220,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"тыква 300 г, вода, имбирь","recipe":"1. Тыкву очистить, нарезать кубиками.\n2. Залить 400 мл воды, добавить кусочек имбиря (1 см).\n3. Варить 20 минут, имбирь удалить.\n4. Взбить блендером, посолить.","bju":"Б:3,Ж:1,У:45"},
  {"name":"Грибная икра","calories":250,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"шампиньоны 200 г, лук, масло 1 ч.л.","recipe":"1. Грибы и лук мелко нарезать.\n2. Обжарить на масле 10 минут.\n3. Измельчить блендером до пастообразной консистенции.\n4. Посолить, поперчить, охладить.","bju":"Б:6,Ж:10,У:16"},
  {"name":"Куриный омлет","calories":240,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яйца 2 шт., куриное филе 50 г, масло 1 ч.л.","recipe":"1. Филе нарезать мелкими кубиками, обжарить на масле 4 минуты.\n2. Яйца взбить, посолить.\n3. Залить яйцами курицу.\n4. Жарить под крышкой 5 минут.","bju":"Б:24,Ж:12,У:2"},
  {"name":"Сырники из обезжиренного творога","calories":280,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"творог 0% 150 г, мука 30 г, яйцо 1 шт.","recipe":"1. Творог размять, добавить яйцо, муку, щепотку соли.\n2. Замесить мягкое тесто.\n3. Сформировать сырники.\n4. Обжарить на сухой сковороде по 4 минуты с каждой стороны.","bju":"Б:22,Ж:2,У:40"},
  {"name":"Рыбные палочки из трески","calories":210,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"филе трески 100 г, мука, яйцо, сухари","recipe":"1. Филе нарезать полосками.\n2. Обвалять в муке, затем во взбитом яйце, затем в сухарях.\n3. Выложить на противень с пергаментом.\n4. Запекать при 200°C 15 минут.","bju":"Б:18,Ж:4,У:22"},
  {"name":"Салат с креветками и ананасом","calories":190,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"креветки 80 г, ананас 50 г, салат, лимонный сок","recipe":"1. Креветки отварить, очистить.\n2. Ананас нарезать кубиками.\n3. Листья салата порвать.\n4. Всё смешать, заправить лимонным соком.","bju":"Б:16,Ж:1,У:18"},
  {"name":"Греческий йогурт с мёдом","calories":230,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"греческий йогурт 150 г, мёд 1 ч.л.","recipe":"1. Йогурт выложить в пиалу.\n2. Полить мёдом.\n3. При желании посыпать корицей.\n4. Подавать.","bju":"Б:10,Ж:8,У:28"},
  {"name":"Смузи из шпината и яблока","calories":270,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"шпинат 50 г, яблоко 1 шт., вода 100 мл","recipe":"1. Шпинат промыть, яблоко нарезать.\n2. Всё поместить в блендер, добавить воду.\n3. Взбить до однородности.\n4. При желании процедить.","bju":"Б:2,Ж:0,У:60"},
  {"name":"Куриные котлеты на пару","calories":220,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"фарш куриный 100 г, лук, яйцо","recipe":"1. Лук измельчить, смешать с фаршем и яйцом.\n2. Посолить, сформировать котлеты.\n3. Готовить на пару 20 минут.\n4. Подавать горячими.","bju":"Б:24,Ж:6,У:8"},
  {"name":"Тушёная индейка с овощами","calories":260,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"филе индейки 100 г, кабачок, перец, масло 1 ч.л.","recipe":"1. Филе нарезать, обжарить на масле 5 минут.\n2. Добавить нарезанные кабачок и перец.\n3. Влить 50 мл воды, тушить под крышкой 15 минут.\n4. Посолить, поперчить.","bju":"Б:26,Ж:6,У:18"},
  {"name":"Лапша с морепродуктами","calories":290,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"лапша 80 г, креветки, мидии 100 г, соевый соус","recipe":"1. Лапшу отварить согласно инструкции.\n2. Морепродукты обжарить на сухой сковороде 5 минут.\n3. Смешать с лапшой, добавить 1 ст. л. соевого соуса.\n4. Прогреть 1 минуту, подавать.","bju":"Б:20,Ж:4,У:44"},
  {"name":"Запечённые овощи с тофу","calories":210,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"тофу 100 г, баклажаны, перец, масло 1 ч.л.","recipe":"1. Тофу нарезать кубиками, овощи — дольками.\n2. Всё смешать с маслом, выложить на противень.\n3. Запекать при 200°C 25 минут.\n4. Посолить, подавать.","bju":"Б:10,Ж:8,У:20"},
  {"name":"Суп-пюре из брокколи","calories":240,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"брокколи 200 г, картофель 100 г, вода","recipe":"1. Брокколи разобрать, картофель нарезать.\n2. Залить 400 мл воды, варить 15 минут.\n3. Взбить блендером.\n4. Посолить, при подаче добавить щепотку мускатного ореха.","bju":"Б:6,Ж:1,У:35"},
  {"name":"Фруктовый салат с орехами","calories":280,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"яблоко, груша, орехи 20 г, йогурт 50 мл","recipe":"1. Фрукты нарезать кубиками.\n2. Орехи порубить.\n3. Смешать, заправить йогуртом.\n4. Сразу подавать.","bju":"Б:4,Ж:8,У:45"},
  {"name":"Гуляш из говядины","calories":240,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"говядина 100 г, лук, томат, паприка","recipe":"1. Говядину нарезать кусочками.\n2. Лук обжарить на сухой сковороде, добавить мясо.\n3. Влить томатную пасту, разведённую в 100 мл воды, посыпать паприкой.\n4. Тушить 1,5 часа до мягкости.","bju":"Б:22,Ж:8,У:10"},
  {"name":"Запечённая курица с картофелем","calories":280,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"куриное бедро 120 г, картофель 150 г, специи","recipe":"1. Бедро натереть специями.\n2. Картофель нарезать дольками.\n3. Выложить всё в форму, запекать при 200°C 50 минут.\n4. Подавать горячим.","bju":"Б:26,Ж:10,У:30"},
  {"name":"Фасолевый суп с мясом","calories":270,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"фасоль 80 г, говядина 50 г, овощи","recipe":"1. Фасоль замочить, затем варить 30 минут.\n2. Добавить нарезанную говядину, морковь, лук.\n3. Варить ещё 40 минут.\n4. Посолить, добавить зелень.","bju":"Б:20,Ж:4,У:36"},
  {"name":"Постные голубцы","calories":200,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"капуста, рис 50 г, грибы, лук","recipe":"1. Листья капусты отварить 5 минут, срезать утолщения.\n2. Рис отварить до полуготовности, грибы и лук обжарить.\n3. Смешать начинку, завернуть в листья.\n4. Уложить в кастрюлю, залить томатным соусом, тушить 40 минут.","bju":"Б:5,Ж:2,У:40"},
  {"name":"Овощное рагу с чечевицей","calories":230,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"чечевица 80 г, кабачки, помидоры","recipe":"1. Чечевицу отварить 15 минут.\n2. Кабачки и помидоры нарезать, потушить 10 минут.\n3. Смешать с чечевицей.\n4. Посолить, тушить ещё 5 минут.","bju":"Б:14,Ж:2,У:40"},
  {"name":"Запечённая тыква с творогом","calories":260,"cost":2,"gotofnost":3,"sutnost":2,"ingredients":"тыква 200 г, творог 5% 100 г, мёд","recipe":"1. Тыкву нарезать ломтиками, запечь 15 минут при 180°C.\n2. Творог смешать с мёдом.\n3. Выложить творог на тыкву.\n4. Запечь ещё 10 минут.","bju":"Б:14,Ж:3,У:42"},
  {"name":"Тартар из тунца","calories":220,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"тунец 100 г, авокадо 30 г, соевый соус","recipe":"1. Тунец и авокадо нарезать мелкими кубиками.\n2. Смешать, добавить 1 ч. л. соевого соуса.\n3. Выложить через кольцо на тарелку.\n4. Подавать немедленно.","bju":"Б:24,Ж:10,У:4"},
  {"name":"Креветки в соусе из лайма","calories":250,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"креветки 120 г, лайм, чеснок, масло 1 ч.л.","recipe":"1. Креветки очистить.\n2. Чеснок измельчить, обжарить на масле 30 секунд.\n3. Добавить креветки, жарить 2 минуты.\n4. Сбрызнуть соком ½ лайма, перемешать.","bju":"Б:26,Ж:4,У:6"},
  {"name":"Утиная грудка с малиной","calories":290,"cost":3,"gotofnost":1,"sutnost":1,"ingredients":"утиная грудка 100 г, малина 50 г, мёд","recipe":"1. На коже утки сделать насечки, обжарить на сухой сковороде со стороны кожи 6 минут.\n2. Перевернуть, жарить ещё 4 минуты.\n3. Малину размять с 1 ч. л. мёда, прогреть.\n4. Подавать грудку с соусом.","bju":"Б:22,Ж:14,У:12"},
  {"name":"Карпаччо из лосося","calories":230,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"лосось 80 г, руккола, пармезан 20 г","recipe":"1. Лосось нарезать тончайшими ломтиками.\n2. Выложить на тарелку, сбрызнуть лимонным соком.\n3. Сверху руккола и стружка пармезана.\n4. Подавать.","bju":"Б:18,Ж:14,У:2"},
  {"name":"Севиче из гребешков","calories":260,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"гребешки 100 г, лайм, перец чили","recipe":"1. Гребешки нарезать кубиками.\n2. Залить соком 2 лаймов, добавить мелко нарезанный чили.\n3. Оставить в холодильнике на 20 минут.\n4. Подавать холодным.","bju":"Б:20,Ж:2,У:16"},
  {"name":"Икра лососёвая с огурцом","calories":280,"cost":3,"gotofnost":1,"sutnost":2,"ingredients":"икра 40 г, огурец 100 г","recipe":"1. Огурец нарезать толстыми кружками.\n2. На каждый кружок выложить чайную ложку икры.\n3. Подавать на блюде.\n4. Можно украсить укропом.","bju":"Б:12,Ж:14,У:8"},
  {"name":"Филе лосося на пару","calories":210,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"филе лосося 100 г, лимон, соль","recipe":"1. Филе посолить, сбрызнуть лимоном.\n2. Готовить на пару 12 минут.\n3. Подавать с зеленью.\n4. Рыба должна быть нежной.","bju":"Б:24,Ж:8,У:0"},
  {"name":"Стейк из сёмги с киноа","calories":270,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"сёмга 100 г, киноа 50 г, спаржа","recipe":"1. Киноа отварить 15 минут.\n2. Спаржу бланшировать 3 минуты.\n3. Сёмгу обжарить на сухой сковороде по 3 минуты с каждой стороны.\n4. Подавать вместе.","bju":"Б:26,Ж:10,У:30"},
  {"name":"Лобстер с лимонным маслом","calories":290,"cost":3,"gotofnost":2,"sutnost":1,"ingredients":"хвост лобстера 120 г, масло сливочное 1 ч.л.","recipe":"1. Хвост лобстера разрезать вдоль пополам.\n2. Смазать маслом.\n3. Обжарить на гриле мясом вниз 4 минуты.\n4. Подавать с долькой лимона.","bju":"Б:30,Ж:6,У:2"},
  {"name":"Салат с морепродуктами","calories":220,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"кальмар, креветки, мидии 100 г, салат, лимон","recipe":"1. Морепродукты отварить (кальмара 2 мин, креветки 2 мин, мидии до открытия).\n2. Остудить, смешать с листьями салата.\n3. Заправить лимонным соком.\n4. Посолить, подавать.","bju":"Б:22,Ж:3,У:10"},
  {"name":"Запечённые устрицы","calories":240,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"устрицы 6 шт., сыр пармезан 20 г","recipe":"1. Устриц открыть, оставить на створках.\n2. Посыпать тёртым пармезаном.\n3. Запекать при 220°C 8–10 минут.\n4. Подавать горячими.","bju":"Б:18,Ж:10,У:8"},
  {"name":"Ризотто с шафраном","calories":290,"cost":3,"gotofnost":2,"sutnost":2,"ingredients":"рис арборио 70 г, шафран, бульон","recipe":"1. Шафран замочить в 2 ст. л. тёплого бульона.\n2. Лук обжарить, добавить рис, прогревать 2 минуты.\n3. Постепенно вливать горячий бульон, помешивая, около 18 минут.\n4. В конце добавить шафрановую воду, перемешать.","bju":"Б:6,Ж:4,У:56"},
  {"name":"Говядина по-бургундски","calories":240,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"говядина 100 г, красное вино, овощи","recipe":"1. Говядину нарезать, обжарить.\n2. Залить 100 мл красного вина и 50 мл воды, добавить морковь, лук.\n3. Тушить 2,5 часа.\n4. Подавать с отварным картофелем (не входит в калории).","bju":"Б:22,Ж:8,У:12"},
  {"name":"Баранья нога с розмарином","calories":280,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"баранина 120 г, розмарин, чеснок","recipe":"1. Баранину натереть чесноком, розмарином, солью.\n2. Запекать при 160°C 2 часа.\n3. Дать отдохнуть 10 минут.\n4. Нарезать ломтиками.","bju":"Б:26,Ж:14,У:4"},
  {"name":"Утка конфи","calories":290,"cost":3,"gotofnost":3,"sutnost":1,"ingredients":"утиная ножка 150 г, утиный жир","recipe":"1. Ножку посолить, оставить на ночь.\n2. Полностью погрузить в утиный жир, готовить при 85°C 3 часа.\n3. Достать, обжарить кожу до хруста.\n4. Подавать.","bju":"Б:24,Ж:20,У:0"},
  {"name":"Трюфельное ризотто","calories":210,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"рис арборио 70 г, трюфельное масло, пармезан","recipe":"1. Рис обжарить с луком.\n2. Постепенно добавлять бульон, помешивая 18 минут.\n3. Снять с огня, вмешать 1 ч. л. трюфельного масла и тёртый пармезан.\n4. Накрыть крышкой на 2 минуты.","bju":"Б:8,Ж:6,У:40"},
  {"name":"Овощной террин","calories":250,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"баклажаны, цукини, перец, яйца","recipe":"1. Овощи нарезать тонкими пластинами, запечь 10 минут.\n2. Яйца взбить, посолить.\n3. В форму слоями выложить овощи, залить яйцами.\n4. Запекать при 180°C 50 минут.","bju":"Б:10,Ж:12,У:18"},
  {"name":"Фаршированные кальмары","calories":280,"cost":3,"gotofnost":3,"sutnost":2,"ingredients":"кальмары 150 г, рис, овощи","recipe":"1. Рис отварить, смешать с мелко нарезанными овощами.\n2. Начинить тушки кальмаров, закрепить зубочистками.\n3. Уложить в сотейник, залить томатным соусом.\n4. Тушить 30 минут.","bju":"Б:22,Ж:4,У:30"},
  {"name":"Омлет с картофелем","calories":380,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"яйца 2 шт., картофель 150 г, масло 1 ч.л.","recipe":"1. Картофель отварить, нарезать ломтиками.\n2. Обжарить на масле до корочки.\n3. Яйца взбить, залить картофель.\n4. Жарить под крышкой 5 минут.","bju":"Б:14,Ж:16,У:35"},
  {"name":"Макароны с томатным соусом","calories":390,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"макароны 80 г, томатная паста 2 ст.л., чеснок, масло 1 ч.л.","recipe":"1. Макароны отварить.\n2. На масле обжарить измельчённый чеснок 30 секунд.\n3. Добавить томатную пасту, 50 мл воды, потушить 5 минут.\n4. Смешать с макаронами.","bju":"Б:10,Ж:6,У:68"},
  {"name":"Куриные сердечки жареные","calories":370,"cost":1,"gotofnost":1,"sutnost":1,"ingredients":"куриные сердечки 150 г, лук, масло 1 ч.л.","recipe":"1. Сердечки промыть, разрезать пополам.\n2. Лук нарезать, обжарить на масле.\n3. Добавить сердечки, жарить 10 минут, помешивая.\n4. Посолить, поперчить.","bju":"Б:28,Ж:18,У:10"},
  {"name":"Фруктовый салат с йогуртом","calories":320,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"яблоко, банан, апельсин, йогурт 100 мл","recipe":"1. Фрукты очистить, нарезать кубиками.\n2. Залить йогуртом.\n3. Перемешать.\n4. Подавать сразу.","bju":"Б:4,Ж:2,У:70"},
  {"name":"Сырники из нежирного творога","calories":350,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"творог 0% 150 г, мука 30 г, яйцо, сахар","recipe":"1. Творог смешать с яйцом, мукой, 1 ч. л. сахара.\n2. Сформировать сырники.\n3. Обжарить на сухой сковороде до румяности.\n4. Подавать со сметаной (не входит).","bju":"Б:24,Ж:2,У:55"},
  {"name":"Овощной ролл в лаваше","calories":380,"cost":1,"gotofnost":1,"sutnost":2,"ingredients":"лаваш 50 г, огурец, перец, салат, соус","recipe":"1. Лаваш смазать лёгким соусом (йогурт с зеленью).\n2. Выложить нарезанные соломкой огурец, перец, листья салата.\n3. Свернуть рулетом.\n4. Разрезать пополам, подавать.","bju":"Б:6,Ж:4,У:70"},
  {"name":"Гречка с тушёнкой","calories":400,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"гречка 80 г, тушёнка 100 г, лук","recipe":"1. Гречку отварить.\n2. Лук обжарить, добавить тушёнку, прогреть.\n3. Смешать с гречкой.\n4. Подавать горячим.","bju":"Б:22,Ж:18,У:48"},
  {"name":"Картофельная запеканка","calories":360,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"картофель 200 г, фарш 80 г, яйцо, сыр 30 г","recipe":"1. Картофель отварить, сделать пюре.\n2. Фарш обжарить с луком.\n3. В форму выложить половину пюре, фарш, оставшееся пюре.\n4. Сверху тёртый сыр, запекать 25 минут при 200°C.","bju":"Б:18,Ж:14,У:42"},
  {"name":"Гороховый суп с копчёностями","calories":330,"cost":1,"gotofnost":2,"sutnost":1,"ingredients":"горох 80 г, копчёная грудинка 50 г, картофель","recipe":"1. Горох замочить, варить 30 минут.\n2. Добавить нарезанную грудинку и картофель.\n3. Варить ещё 30 минут.\n4. Посолить, подавать.","bju":"Б:20,Ж:10,У:45"},
  {"name":"Овощное рагу без мяса","calories":310,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"кабачки, баклажаны, помидоры — всего 400 г, масло 1 ч.л.","recipe":"1. Все овощи нарезать кубиками.\n2. В сотейнике разогреть масло, выложить овощи.\n3. Тушить под крышкой 25 минут, помешивая.\n4. Посолить, добавить зелень.","bju":"Б:5,Ж:6,У:48"},
  {"name":"Тыквенная каша на воде","calories":340,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"пшено 60 г, тыква 150 г, вода","recipe":"1. Пшено промыть, тыкву натереть.\n2. Залить 300 мл воды, варить после закипания 20 минут.\n3. При необходимости добавить воды.\n4. Подавать горячей.","bju":"Б:8,Ж:3,У:70"},
  {"name":"Салат с фасолью и овощами","calories":370,"cost":1,"gotofnost":2,"sutnost":2,"ingredients":"фасоль консерв. 150 г, помидоры, огурец, лук, масло 1 ч.л.","recipe":"1. Овощи нарезать кубиками.\n2. Смешать с фасолью (без жидкости).\n3. Заправить маслом, посолить.\n4. Дать настояться 10 минут.","bju":"Б:14,Ж:6,У:55"},
  {"name":"Перловка с мясом","calories":390,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"перловка 80 г, говядина 100 г, лук, морковь","recipe":"1. Говядину потушить с луком и морковью 1 час.\n2. Перловку отварить отдельно.\n3. Смешать, добавить 50 мл бульона.\n4. Тушить вместе 15 минут.","bju":"Б:24,Ж:10,У:55"},
  {"name":"Тушёная фасоль с овощами","calories":340,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"фасоль 100 г, морковь, лук, томат","recipe":"1. Фасоль замочить, отварить 40 минут.\n2. Лук и морковь обжарить, добавить томат.\n3. Смешать с фасолью.\n4. Тушить ещё 20 минут.","bju":"Б:18,Ж:2,У:60"},
  {"name":"Щи из квашеной капусты","calories":320,"cost":1,"gotofnost":3,"sutnost":1,"ingredients":"квашеная капуста 200 г, картофель 150 г, лук","recipe":"1. Квашеную капусту промыть, потушить 20 минут.\n2. Картофель нарезать, залить водой, варить 10 минут.\n3. Добавить капусту, лук, варить ещё 20 минут.\n4. Посолить, поперчить.","bju":"Б:6,Ж:4,У:52"},
  {"name":"Постный борщ с фасолью","calories":310,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"свёкла 150 г, капуста 100 г, фасоль 80 г","recipe":"1. Фасоль замочить, отварить.\n2. Свёклу натереть, капусту нашинковать.\n3. Варить всё вместе 30 минут.\n4. Посолить, добавить уксус по желанию.","bju":"Б:10,Ж:2,У:58"},
  {"name":"Овощные котлеты","calories":350,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"картофель, морковь, кабачки, мука, яйцо","recipe":"1. Овощи натереть, отжать сок.\n2. Добавить муку, яйцо, посолить.\n3. Сформировать котлеты.\n4. Запечь при 200°C 25 минут.","bju":"Б:8,Ж:8,У:55"},
  {"name":"Грибной суп с лапшой","calories":380,"cost":1,"gotofnost":3,"sutnost":2,"ingredients":"шампиньоны 150 г, лапша 50 г, овощи","recipe":"1. Грибы нарезать, варить 15 минут.\n2. Добавить нарезанные морковь, лук, картофель.\n3. За 5 минут до готовности всыпать лапшу.\n4. Посолить, подавать.","bju":"Б:10,Ж:4,У:65"},
  {"name":"Курица с овощами в соевом соусе","calories":370,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"куриное филе 120 г, перец, лук, соевый соус, масло 1 ч.л.","recipe":"1. Филе нарезать полосками.\n2. Овощи нашинковать.\n3. Обжарить всё на масле 5 минут.\n4. Добавить 1 ст. л. соевого соуса, прогреть 2 минуты.","bju":"Б:30,Ж:8,У:18"},
  {"name":"Паста с курицей и грибами","calories":400,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"паста 80 г, куриное филе 80 г, шампиньоны 80 г, сливки 30 мл","recipe":"1. Пасту отварить.\n2. Филе и грибы обжарить.\n3. Влить сливки, потушить 3 минуты.\n4. Смешать с пастой.","bju":"Б:26,Ж:10,У:48"},
  {"name":"Омлет с лососем","calories":360,"cost":2,"gotofnost":1,"sutnost":1,"ingredients":"яйца 2 шт., лосось слабосолёный 50 г, масло 1 ч.л.","recipe":"1. Яйца взбить.\n2. Лосось нарезать кусочками.\n3. Вылить яйца на масло, сверху выложить рыбу.\n4. Жарить под крышкой 4 минуты.","bju":"Б:22,Ж:20,У:4"},
  {"name":"Салат с авокадо и тунцом","calories":330,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"тунец консерв. 80 г, авокадо ½ шт., салат, лимон","recipe":"1. Авокадо нарезать кубиками.\n2. Тунец размять.\n3. Смешать с листьями салата.\n4. Заправить лимонным соком.","bju":"Б:22,Ж:18,У:10"},
  {"name":"Греческий йогурт с орехами","calories":350,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"греческий йогурт 150 г, орехи 30 г, мёд","recipe":"1. Орехи порубить.\n2. Йогурт выложить в креманку.\n3. Посыпать орехами, полить мёдом.\n4. Подавать.","bju":"Б:12,Ж:12,У:40"},
  {"name":"Смузи из манго и шпината","calories":380,"cost":2,"gotofnost":1,"sutnost":2,"ingredients":"манго 100 г, шпинат 50 г, кокосовая вода 150 мл","recipe":"1. Манго очистить, нарезать.\n2. Всё поместить в блендер.\n3. Взбить до однородности.\n4. Пить охлаждённым.","bju":"Б:3,Ж:2,У:80"},
  {"name":"Куриная грудка с гречкой","calories":380,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"куриная грудка 120 г, гречка 80 г, масло 1 ч.л.","recipe":"1. Грудку обжарить на масле до готовности.\n2. Гречку отварить.\n3. Подавать вместе.\n4. При желании добавить зелень.","bju":"Б:34,Ж:8,У:44"},
  {"name":"Рыбные котлеты с рисом","calories":360,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"филе трески 100 г, рис 50 г, лук, яйцо","recipe":"1. Рис отварить.\n2. Рыбу и лук измельчить, смешать с рисом, яйцом.\n3. Сформировать котлеты.\n4. Обжарить на сухой сковороде.","bju":"Б:24,Ж:6,У:48"},
  {"name":"Запечённая индейка с овощами","calories":390,"cost":2,"gotofnost":2,"sutnost":1,"ingredients":"филе индейки 120 г, брокколи, морковь, масло 1 ч.л.","recipe":"1. Индейку нарезать, овощи измельчить.\n2. Всё смешать с маслом, выложить в форму.\n3. Запекать 30 минут при 200°C.\n4. Посолить, поперчить.","bju":"Б:30,Ж:8,У:28"},
  {"name":"Суп-пюре из тыквы с имбирём","calories":320,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"тыква 250 г, имбирь, вода, сливки 20 мл","recipe":"1. Тыкву и кусочек имбиря сварить.\n2. Взбить блендером.\n3. Добавить сливки.\n4. Прогреть, не кипятить.","bju":"Б:4,Ж:3,У:50"},
  {"name":"Киноа с овощами и фетой","calories":350,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"киноа 60 г, помидоры, огурец, фета 40 г","recipe":"1. Киноа отварить.\n2. Овощи нарезать кубиками, фету раскрошить.\n3. Смешать.\n4. Заправить оливковым маслом (1 ч.л.).","bju":"Б:14,Ж:12,У:50"},
  {"name":"Грибной жюльен без масла","calories":380,"cost":2,"gotofnost":2,"sutnost":2,"ingredients":"шампиньоны 200 г, сметана 10% 50 г, сыр 30 г","recipe":"1. Грибы нарезать, потушить в собственном соку.\n2. Добавить сметану, перемешать.\n3. Выложить в кокотницы, посыпать сыром.\n4. Запечь при 200°C 15 минут.","bju":"Б:12,Ж:16,У:18"},
  {"name":"Тушёная свинина с черносливом","calories":400,"cost":2,"gotofnost":3,"sutnost":1,"ingredients":"свинина 120 г, чернослив 50 г, лук","recipe":"1. Свинину нарезать, обжарить.\n2. Добавить лук, чернослив, 100 мл воды.\n3. Тушить 1,5 часа.\n4. Подавать с гарниром (не входит).","bju":"Б:24,Ж:16,У:22"},
